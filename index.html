<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Select Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-void: #060b14;
      --bg-grid: #11243a;
      --panel-top: rgba(11, 29, 49, 0.92);
      --panel-bottom: rgba(4, 14, 25, 0.92);
      --line: #4a698a;
      --line-soft: rgba(163, 210, 255, 0.3);
      --text: #ecf4ff;
      --text-soft: #9bc2e8;
      --accent: #f3c847;
      --accent-2: #6fd6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Rajdhani", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 14%, rgba(72, 165, 255, 0.27), transparent 30%),
        radial-gradient(circle at 82% 24%, rgba(216, 64, 90, 0.23), transparent 30%),
        linear-gradient(180deg, #0a1220 0%, #0c1a2d 52%, #08111d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(159, 211, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(159, 211, 255, 0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 80%);
      z-index: -1;
    }

    .shell {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 20px 16px 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      min-height: 100vh;
    }

    .top-hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 10px;
      animation: slideDown 620ms ease both;
    }

    .fighter-stat {
      border: 2px solid var(--line);
      border-bottom: 4px solid var(--accent);
      background: linear-gradient(180deg, var(--panel-top), rgba(4, 14, 25, 0.92));
      padding: 10px 12px;
      min-height: 88px;
      box-shadow: inset 0 0 0 1px rgba(180, 219, 255, 0.15);
    }

    .fighter-stat h2 {
      margin: 0 0 6px;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      letter-spacing: 0.05em;
      font-size: clamp(0.95rem, 1.8vw, 1.3rem);
      font-weight: 700;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      font-size: 0.84rem;
      color: var(--text-soft);
    }

    .stat-grid strong {
      color: #f4fcff;
      font-weight: 700;
      display: block;
      font-size: 1rem;
      margin-top: 1px;
    }

    .mode-pill {
      align-self: center;
      justify-self: center;
      border: 2px solid var(--line-soft);
      border-radius: 999px;
      padding: 8px 16px;
      text-align: center;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      color: #d7ecff;
      background: linear-gradient(180deg, rgba(11, 25, 41, 0.9), rgba(5, 14, 24, 0.9));
      text-transform: uppercase;
      white-space: nowrap;
    }

    .main-stage {
      border: 2px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 20%),
        linear-gradient(180deg, #0f2136 0%, #0b1624 65%, #08121f 100%);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(204, 230, 255, 0.16);
      overflow: hidden;
      position: relative;
      display: grid;
      align-items: stretch;
      animation: stageFade 840ms ease both;
    }

    .main-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(141, 213, 255, 0.3), transparent 42%),
        radial-gradient(circle at 50% 80%, rgba(0, 0, 0, 0.45), transparent 54%);
      pointer-events: none;
    }

    .faceoff {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: end;
      min-height: 340px;
      padding: clamp(16px, 2.2vw, 28px);
      padding-bottom: clamp(96px, 9vw, 132px);
      gap: 16px;
    }

    .portrait {
      height: clamp(220px, 42vw, 440px);
      display: grid;
      align-items: end;
      justify-items: center;
      position: relative;
      opacity: 0;
      animation: revealPortrait 560ms ease forwards;
    }

    .portrait.right {
      animation-delay: 140ms;
    }

    .portrait img {
      width: min(94%, 460px);
      max-height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 20px 24px rgba(0, 0, 0, 0.5));
    }

    .portrait.right img {
      transform: scaleX(-1);
    }

    .versus {
      align-self: center;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(243, 200, 71, 0.45);
      border: 2px solid rgba(243, 200, 71, 0.65);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(20, 31, 43, 0.82);
      white-space: nowrap;
    }

    .quick-actions {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(920px, calc(100% - 28px));
      animation: riseUp 760ms ease both;
      animation-delay: 180ms;
    }

    .action {
      text-decoration: none;
      border: 2px solid rgba(226, 241, 255, 0.5);
      color: var(--text);
      background: linear-gradient(180deg, rgba(24, 48, 73, 0.9), rgba(10, 22, 36, 0.95));
      padding: 10px 14px;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-width: 176px;
      text-align: center;
      transition: transform 140ms ease, border-color 140ms ease, filter 140ms ease;
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent-2);
      filter: brightness(1.08);
    }

    .action.primary {
      border-color: rgba(243, 200, 71, 0.65);
      background: linear-gradient(180deg, rgba(83, 60, 19, 0.95), rgba(53, 37, 8, 0.98));
      color: #ffefbd;
    }

    .roster {
      border: 2px solid var(--line);
      background: linear-gradient(180deg, rgba(8, 20, 33, 0.94), rgba(4, 12, 22, 0.94));
      padding: 12px;
      display: grid;
      gap: 10px;
      animation: slideUp 620ms ease both;
      animation-delay: 120ms;
    }

    .roster-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .roster-head strong {
      font-family: "Orbitron", "Segoe UI", sans-serif;
      color: #e8f4ff;
      letter-spacing: 0.04em;
      font-size: 1rem;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 8px;
    }

    .roster-card {
      appearance: none;
      border: 2px solid rgba(175, 215, 255, 0.26);
      background: linear-gradient(180deg, rgba(33, 59, 89, 0.55), rgba(16, 30, 47, 0.72));
      aspect-ratio: 3 / 4;
      overflow: hidden;
      display: grid;
      place-items: end center;
      transition: border-color 160ms ease, transform 160ms ease;
      position: relative;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      width: 100%;
      padding: 0;
    }

    .roster-card img {
      width: 100%;
      height: calc(100% - 20px);
      object-fit: cover;
      object-position: center top;
      opacity: 0.95;
    }

    .roster-card[data-name="Flash"] img,
    .roster-card[data-name="Doomsday"] img,
    .roster-card[data-name="Killer Croc"] img {
      object-fit: cover;
      object-position: center center;
      transform: scale(1.14);
      transform-origin: center center;
    }

    .roster-card[data-name="Killer Croc"] img {
      transform: scale(1.22);
    }

    .roster-card::after {
      content: attr(data-name);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 3px 4px;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: linear-gradient(180deg, transparent, rgba(6, 14, 24, 0.88));
      color: #d7ebff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .roster-card:hover {
      transform: translateY(-2px);
      border-color: rgba(111, 214, 255, 0.82);
    }

    .roster-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(243, 200, 71, 0.35);
    }

    .portrait img.swap {
      animation: portraitSwap 260ms ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes stageFade {
      from {
        opacity: 0;
        transform: scale(0.995);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes revealPortrait {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translate(-50%, 10px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes portraitSwap {
      from {
        opacity: 0.6;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .shell {
        gap: 10px;
      }

      .top-hud {
        grid-template-columns: 1fr;
      }

      .mode-pill {
        justify-self: stretch;
      }

      .faceoff {
        grid-template-columns: 1fr;
        align-items: center;
        justify-items: center;
        min-height: 420px;
        padding-bottom: 16px;
      }

      .portrait {
        height: 200px;
      }

      .portrait.right {
        order: 2;
      }

      .versus {
        order: 1;
      }

      .quick-actions {
        position: static;
        transform: none;
        width: 100%;
        margin-top: -8px;
        padding: 0 10px 12px;
      }

      .roster-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 14px 10px 16px;
      }

      .fighter-stat {
        min-height: auto;
      }

      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main-stage {
        overflow: visible;
      }

      .faceoff {
        min-height: 360px;
        padding: 10px 10px 14px;
      }

      .portrait {
        height: 160px;
      }

      .action {
        min-width: 0;
        flex: 1 1 48%;
      }

      .roster-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Command select home page">
    <header class="top-hud">
      <section class="fighter-stat" aria-label="Left profile">
        <h2 id="leftFighterName">GREEN LANTERN</h2>
        <div class="stat-grid">
          <div>LVL<strong id="leftStatLvl">20</strong></div>
          <div>STR<strong id="leftStatStr">2144</strong></div>
          <div>ABL<strong id="leftStatAbl">2152</strong></div>
          <div>HP<strong id="leftStatHp">1284</strong></div>
        </div>
      </section>
      <div class="mode-pill">Simulation Select</div>
      <section class="fighter-stat" aria-label="Right profile">
        <h2 style="text-align:right;">HAWKGIRL</h2>
        <div class="stat-grid">
          <div>LVL<strong>20</strong></div>
          <div>STR<strong>1813</strong></div>
          <div>ABL<strong>2753</strong></div>
          <div>HP<strong>1474</strong></div>
        </div>
      </section>
    </header>

    <section class="main-stage" aria-label="Featured selection">
      <div class="faceoff">
        <figure class="portrait left">
          <img id="leftPortraitImage" src="images/thehaljordan.PNG" alt="Green Lantern portrait" />
        </figure>
        <div class="versus">VS</div>
        <figure class="portrait right">
          <img src="images/thehawkgirl.PNG" alt="Featured right fighter" />
        </figure>
      </div>

      <nav class="quick-actions" aria-label="Main page links">
        <a class="action primary" href="fighter-game.html?v=cardscale2">Enter Fight Game</a>
        <a class="action" href="simulation.html">Open Pump Simulation</a>
        <a class="action" href="oil-platform.html">Open Platform Simulation</a>
      </nav>
    </section>

    <section class="roster" aria-label="Roster strip preview">
      <div class="roster-head">
        <strong>Character Roster Style</strong>
        <span>Home layout inspired by a versus select screen</span>
      </div>
      <div class="roster-grid">
        <button class="roster-card active" type="button" data-name="Green Lantern" data-image="images/thehaljordan.PNG" data-lvl="20" data-str="2144" data-abl="2152" data-hp="1284" aria-pressed="true"><img src="images/thehaljordan.PNG" alt="Green Lantern card" /></button>
        <button class="roster-card" type="button" data-name="Flash" data-image="images/theflash.PNG" data-lvl="20" data-str="2080" data-abl="2630" data-hp="1210" aria-pressed="false"><img src="images/theflash.PNG" alt="Flash card" /></button>
        <button class="roster-card" type="button" data-name="Doomsday" data-image="images/thedoomsday.PNG" data-lvl="20" data-str="2775" data-abl="1665" data-hp="1690" aria-pressed="false"><img src="images/thedoomsday.PNG" alt="Doomsday card" /></button>
        <button class="roster-card" type="button" data-name="Hawkgirl" data-image="images/thehawkgirl.PNG" data-lvl="20" data-str="1813" data-abl="2753" data-hp="1474" aria-pressed="false"><img src="images/thehawkgirl.PNG" alt="Hawkgirl card" /></button>
        <button class="roster-card" type="button" data-name="Killer Croc" data-image="images/thekillercroc.PNG" data-lvl="20" data-str="2698" data-abl="1520" data-hp="1730" aria-pressed="false"><img src="images/thekillercroc.PNG" alt="Killer Croc card" /></button>
      </div>
    </section>
  </main>
  <script>
    const rosterCards = Array.from(document.querySelectorAll('.roster-card'));
    const leftName = document.getElementById('leftFighterName');
    const leftPortraitImage = document.getElementById('leftPortraitImage');
    const leftStatLvl = document.getElementById('leftStatLvl');
    const leftStatStr = document.getElementById('leftStatStr');
    const leftStatAbl = document.getElementById('leftStatAbl');
    const leftStatHp = document.getElementById('leftStatHp');

    function selectCard(card) {
      rosterCards.forEach((entry) => {
        const active = entry === card;
        entry.classList.toggle('active', active);
        entry.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      const name = card.dataset.name || 'Fighter';
      leftName.textContent = name.toUpperCase();
      leftPortraitImage.src = card.dataset.image || leftPortraitImage.src;
      leftPortraitImage.alt = `${name} portrait`;
      leftStatLvl.textContent = card.dataset.lvl || leftStatLvl.textContent;
      leftStatStr.textContent = card.dataset.str || leftStatStr.textContent;
      leftStatAbl.textContent = card.dataset.abl || leftStatAbl.textContent;
      leftStatHp.textContent = card.dataset.hp || leftStatHp.textContent;

      leftPortraitImage.classList.remove('swap');
      void leftPortraitImage.offsetWidth;
      leftPortraitImage.classList.add('swap');
    }

    rosterCards.forEach((card) => {
      card.addEventListener('click', () => selectCard(card));
    });
  </script>
</body>
</html>
