<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selection of Fight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-void: #060b14;
      --bg-grid: #11243a;
      --panel-top: rgba(11, 29, 49, 0.92);
      --panel-bottom: rgba(4, 14, 25, 0.92);
      --line: #4a698a;
      --line-soft: rgba(163, 210, 255, 0.3);
      --text: #ecf4ff;
      --text-soft: #9bc2e8;
      --accent: #f3c847;
      --accent-2: #6fd6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(12, 10, 16, 0.72), rgba(12, 6, 10, 0.86)),
        url("images/redsunprison.PNG?v=2") center center / cover no-repeat fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 18% 14%, rgba(255, 122, 122, 0.26), transparent 32%),
        radial-gradient(circle at 82% 22%, rgba(236, 198, 110, 0.2), transparent 34%),
        linear-gradient(rgba(255, 180, 180, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 180, 180, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 80%);
      z-index: -1;
    }

    .shell {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 20px 16px 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(14px) scale(0.995);
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
    }

    body.lobby-open .shell {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .home-screen {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(14, 10, 12, 0.72), rgba(8, 6, 7, 0.86)),
        url("images/redsunprison.PNG?v=2") center center / cover no-repeat;
      transition: opacity 280ms ease;
    }

    .home-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .home-panel {
      width: min(760px, 100%);
      border: 2px solid rgba(255, 221, 184, 0.6);
      background: linear-gradient(180deg, rgba(31, 14, 16, 0.86), rgba(14, 9, 10, 0.9));
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 213, 177, 0.22);
      border-radius: 12px;
      padding: clamp(18px, 4vw, 34px);
      text-align: center;
    }

    .home-box {
      border: 2px solid rgba(255, 222, 171, 0.75);
      background: linear-gradient(180deg, rgba(40, 16, 16, 0.82), rgba(20, 9, 9, 0.9));
      color: #ffe6c0;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 10px;
      display: grid;
      place-items: center;
      margin-left: auto;
      margin-right: auto;
    }

    .logo-box {
      width: min(640px, 100%);
      min-height: clamp(110px, 20vw, 190px);
      font-size: clamp(1.2rem, 4vw, 2.4rem);
      text-shadow: 0 0 16px rgba(243, 149, 114, 0.45);
    }

    .play-box {
      margin-top: 14px;
      width: min(260px, 70%);
      min-height: 74px;
      padding: 8px;
    }

    .enter-lobby-btn {
      border: 2px solid rgba(255, 222, 171, 0.85);
      background: linear-gradient(180deg, rgba(126, 45, 27, 0.94), rgba(72, 23, 12, 0.98));
      color: #ffefcf;
      padding: 12px 18px;
      border-radius: 10px;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.84rem;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .enter-lobby-btn:hover,
    .enter-lobby-btn:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .top-hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 10px;
      animation: slideDown 620ms ease both;
    }

    .fighter-stat {
      border: 2px solid var(--line);
      border-bottom: 4px solid var(--accent);
      background: linear-gradient(180deg, var(--panel-top), rgba(4, 14, 25, 0.92));
      padding: 10px 12px;
      min-height: 88px;
      box-shadow: inset 0 0 0 1px rgba(180, 219, 255, 0.15);
    }

    .fighter-stat h2 {
      margin: 0 0 6px;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      letter-spacing: 0.05em;
      font-size: clamp(0.95rem, 1.8vw, 1.3rem);
      font-weight: 700;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      font-size: 0.84rem;
      color: var(--text-soft);
    }

    .stat-grid strong {
      color: #f4fcff;
      font-weight: 700;
      display: block;
      font-size: 1rem;
      margin-top: 1px;
    }

    .mode-pill {
      align-self: center;
      justify-self: center;
      border: 2px solid var(--line-soft);
      border-radius: 999px;
      padding: 8px 16px;
      text-align: center;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      color: #d7ecff;
      background: linear-gradient(180deg, rgba(11, 25, 41, 0.9), rgba(5, 14, 24, 0.9));
      text-transform: uppercase;
      white-space: nowrap;
    }

    .main-stage {
      border: 2px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 20%),
        linear-gradient(180deg, #0f2136 0%, #0b1624 65%, #08121f 100%);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(204, 230, 255, 0.16);
      overflow: hidden;
      position: relative;
      display: grid;
      align-items: stretch;
      animation: stageFade 840ms ease both;
    }

    .main-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(141, 213, 255, 0.3), transparent 42%),
        radial-gradient(circle at 50% 80%, rgba(0, 0, 0, 0.45), transparent 54%);
      pointer-events: none;
    }

    .faceoff {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: end;
      min-height: 340px;
      padding: clamp(16px, 2.2vw, 28px);
      padding-bottom: clamp(96px, 9vw, 132px);
      gap: 16px;
    }

    .portrait {
      height: clamp(220px, 42vw, 440px);
      display: grid;
      align-items: end;
      justify-items: center;
      position: relative;
      opacity: 0;
      animation: revealPortrait 560ms ease forwards;
    }

    .portrait.right {
      animation-delay: 140ms;
    }

    .portrait img {
      --portrait-scale-x: 1;
      --portrait-scale-y: 1;
      width: min(94%, 460px);
      max-height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 20px 24px rgba(0, 0, 0, 0.5));
      transform-origin: center bottom;
      transform: scale(var(--portrait-scale-x), var(--portrait-scale-y));
    }

    .portrait.right img {
      transform: scaleX(-1) scale(var(--portrait-scale-x), var(--portrait-scale-y));
    }

    #leftPortraitImage[src*="theflash"],
    #rightPortraitImage[src*="theflash"] {
      --portrait-scale-x: 1.04;
      --portrait-scale-y: 1.34;
    }

    #leftPortraitImage[src*="thedoomsday"],
    #rightPortraitImage[src*="thedoomsday"] {
      --portrait-scale-x: 1.05;
      --portrait-scale-y: 1.32;
    }

    #leftPortraitImage[src*="thekillercroc"],
    #rightPortraitImage[src*="thekillercroc"] {
      --portrait-scale-x: 0.98;
      --portrait-scale-y: 1.18;
      object-position: 50% bottom;
    }

    .versus {
      align-self: center;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(243, 200, 71, 0.45);
      border: 2px solid rgba(243, 200, 71, 0.65);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(20, 31, 43, 0.82);
      white-space: nowrap;
    }

    .versus-wrap {
      display: grid;
      justify-items: center;
      align-self: center;
      gap: 8px;
    }

    .opponent-status {
      min-height: 22px;
      padding: 4px 8px;
      border: 1px solid rgba(155, 214, 255, 0.35);
      border-radius: 999px;
      background: rgba(8, 18, 32, 0.7);
      color: #9fd8ff;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .quick-actions {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(920px, calc(100% - 28px));
      animation: riseUp 760ms ease both;
      animation-delay: 180ms;
    }

    .action {
      text-decoration: none;
      border: 2px solid rgba(226, 241, 255, 0.5);
      color: var(--text);
      background: linear-gradient(180deg, rgba(24, 48, 73, 0.9), rgba(10, 22, 36, 0.95));
      padding: 10px 14px;
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-width: 176px;
      text-align: center;
      transition: transform 140ms ease, border-color 140ms ease, filter 140ms ease;
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent-2);
      filter: brightness(1.08);
    }

    .action.primary {
      border-color: rgba(243, 200, 71, 0.65);
      background: linear-gradient(180deg, rgba(83, 60, 19, 0.95), rgba(53, 37, 8, 0.98));
      color: #ffefbd;
    }

    .action.disabled {
      pointer-events: none;
      opacity: 0.58;
      filter: grayscale(0.35);
    }

    .roster {
      border: 2px solid var(--line);
      background: linear-gradient(180deg, rgba(8, 20, 33, 0.94), rgba(4, 12, 22, 0.94));
      padding: 12px;
      display: grid;
      gap: 10px;
      animation: slideUp 620ms ease both;
      animation-delay: 120ms;
    }

    .roster-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .roster-head strong {
      font-family: "Orbitron", "Segoe UI", sans-serif;
      color: #e8f4ff;
      letter-spacing: 0.04em;
      font-size: 1rem;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .roster-card {
      appearance: none;
      border: 2px solid rgba(175, 215, 255, 0.26);
      background: linear-gradient(180deg, rgba(33, 59, 89, 0.55), rgba(16, 30, 47, 0.72));
      aspect-ratio: 3 / 5;
      overflow: hidden;
      display: grid;
      place-items: end center;
      transition: border-color 160ms ease, transform 160ms ease;
      position: relative;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      width: 100%;
      padding: 0;
    }

    .roster-card img {
      width: 100%;
      height: calc(100% - 20px);
      object-fit: cover;
      object-position: center bottom;
      opacity: 0.95;
      transform-origin: center bottom;
    }

    .roster-card[data-name="Flash"] img,
    .roster-card[data-name="Doomsday"] img,
    .roster-card[data-name="Killer Croc"] img {
      object-fit: cover;
      object-position: center center;
      transform: scale(1.04, 1.32);
      transform-origin: center center;
    }

    .roster-card[data-name="Doomsday"] img {
      transform: scale(1.03, 1.3);
    }

    .roster-card[data-name="Killer Croc"] img {
      transform: scale(0.98, 1.16);
      object-position: 50% center;
    }

    .roster-card::after {
      content: attr(data-name);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 3px 4px;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: linear-gradient(180deg, transparent, rgba(6, 14, 24, 0.88));
      color: #d7ebff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .roster-card:hover {
      transform: translateY(-2px);
      border-color: rgba(111, 214, 255, 0.82);
    }

    .roster-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(243, 200, 71, 0.35);
    }

    .portrait img.swap {
      animation: portraitSwap 260ms ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes stageFade {
      from {
        opacity: 0;
        transform: scale(0.995);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes revealPortrait {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translate(-50%, 10px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes portraitSwap {
      from {
        opacity: 0.6;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .shell {
        gap: 10px;
      }

      .top-hud {
        grid-template-columns: 1fr;
      }

      .mode-pill {
        justify-self: stretch;
      }

      .faceoff {
        grid-template-columns: 1fr;
        align-items: center;
        justify-items: center;
        min-height: 420px;
        padding-bottom: 16px;
      }

      .portrait {
        height: 200px;
      }

      .portrait.right {
        order: 2;
      }

      .versus {
        order: 1;
      }

      .quick-actions {
        position: static;
        transform: none;
        width: 100%;
        margin-top: -8px;
        padding: 0 10px 12px;
      }

      .roster-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 14px 10px 16px;
      }

      .fighter-stat {
        min-height: auto;
      }

      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main-stage {
        overflow: visible;
      }

      .faceoff {
        min-height: 360px;
        padding: 10px 10px 14px;
      }

      .portrait {
        height: 160px;
      }

      .action {
        min-width: 0;
        flex: 1 1 48%;
      }

      .roster-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <section class="home-screen" id="homeScreen" aria-label="Home start screen">
    <div class="home-panel">
      <div class="home-box logo-box" aria-label="Game logo">Injustice: Gods Among Us (Bootleg)</div>
      <div class="home-box play-box" aria-label="Play placeholder">
        <button class="enter-lobby-btn" id="enterLobbyBtn" type="button">Play</button>
      </div>
    </div>
  </section>

  <main class="shell" aria-label="Command select home page">
    <header class="top-hud">
      <section class="fighter-stat" aria-label="Left profile">
        <h2 id="leftFighterName">GREEN LANTERN</h2>
        <div class="stat-grid">
          <div>LVL<strong id="leftStatLvl">20</strong></div>
          <div>STR<strong id="leftStatStr">2144</strong></div>
          <div>ABL<strong id="leftStatAbl">2152</strong></div>
          <div>HP<strong id="leftStatHp">1284</strong></div>
        </div>
      </section>
      <div class="mode-pill">Selection of Fight</div>
      <section class="fighter-stat" aria-label="Right profile">
        <h2 id="rightFighterName" style="text-align:right;">HAWKGIRL</h2>
        <div class="stat-grid">
          <div>LVL<strong id="rightStatLvl">20</strong></div>
          <div>STR<strong id="rightStatStr">1813</strong></div>
          <div>ABL<strong id="rightStatAbl">2753</strong></div>
          <div>HP<strong id="rightStatHp">1474</strong></div>
        </div>
      </section>
    </header>

    <section class="main-stage" aria-label="Featured selection">
      <div class="faceoff">
        <figure class="portrait left">
          <img id="leftPortraitImage" src="images/thehaljordan.PNG" alt="Green Lantern portrait" />
        </figure>
        <div class="versus-wrap">
          <div class="versus">VS</div>
          <div class="opponent-status" id="opponentStatus" aria-live="polite">AI opponent ready</div>
        </div>
        <figure class="portrait right">
          <img id="rightPortraitImage" src="images/thehawkgirl.PNG" alt="Hawkgirl portrait" />
        </figure>
      </div>

      <nav class="quick-actions" aria-label="Main page links">
        <a class="action primary" id="enterFightLink" href="fighter-game.html?v=cardscale2">Enter Fight Game</a>
      </nav>
    </section>

    <section class="roster" aria-label="Roster strip preview">
      <div class="roster-head">
        <strong>Roster</strong>
      </div>
      <div class="roster-grid">
        <button class="roster-card active" type="button" data-id="green-lantern" data-name="Green Lantern" data-image="images/thehaljordan.PNG" data-lvl="20" data-str="2280" data-abl="2210" data-hp="1450" aria-pressed="true"><img src="images/thehaljordan.PNG" alt="Green Lantern card" /></button>
        <button class="roster-card" type="button" data-id="flash" data-name="Flash" data-image="images/theflash.PNG" data-lvl="20" data-str="2235" data-abl="2460" data-hp="1420" aria-pressed="false"><img src="images/theflash.PNG" alt="Flash card" /></button>
        <button class="roster-card" type="button" data-id="doomsday" data-name="Doomsday" data-image="images/thedoomsday.PNG" data-lvl="20" data-str="2450" data-abl="2050" data-hp="1540" aria-pressed="false"><img src="images/thedoomsday.PNG" alt="Doomsday card" /></button>
        <button class="roster-card" type="button" data-id="hawkgirl" data-name="Hawkgirl" data-image="images/thehawkgirl.PNG" data-lvl="20" data-str="2180" data-abl="2400" data-hp="1465" aria-pressed="false"><img src="images/thehawkgirl.PNG" alt="Hawkgirl card" /></button>
        <button class="roster-card" type="button" data-id="killercroc" data-name="Killer Croc" data-image="images/thekillercroc.PNG" data-lvl="20" data-str="2410" data-abl="1980" data-hp="1560" aria-pressed="false"><img src="images/thekillercroc.PNG" alt="Killer Croc card" /></button>
      </div>
    </section>
  </main>
  <script>
    const rosterCards = Array.from(document.querySelectorAll('.roster-card'));
    const leftName = document.getElementById('leftFighterName');
    const leftPortraitImage = document.getElementById('leftPortraitImage');
    const leftStatLvl = document.getElementById('leftStatLvl');
    const leftStatStr = document.getElementById('leftStatStr');
    const leftStatAbl = document.getElementById('leftStatAbl');
    const leftStatHp = document.getElementById('leftStatHp');
    const rightName = document.getElementById('rightFighterName');
    const rightPortraitImage = document.getElementById('rightPortraitImage');
    const rightStatLvl = document.getElementById('rightStatLvl');
    const rightStatStr = document.getElementById('rightStatStr');
    const rightStatAbl = document.getElementById('rightStatAbl');
    const rightStatHp = document.getElementById('rightStatHp');
    const opponentStatus = document.getElementById('opponentStatus');
    const enterFightLink = document.getElementById('enterFightLink');
    const homeScreen = document.getElementById('homeScreen');
    const enterLobbyBtn = document.getElementById('enterLobbyBtn');

    const OPPONENT_SELECT_DURATION_MS = 5000;
    const OPPONENT_SHUFFLE_STEP_MS = 180;

    let opponentCountdownInterval = null;
    let opponentShuffleInterval = null;
    let opponentFinalizeTimeout = null;
    let latestOpponentPreview = null;
    let selectedPlayerCard = null;
    let finalizedOpponentCard = null;

    function openLobby() {
      document.body.classList.add('lobby-open');
      if (homeScreen) {
        homeScreen.classList.add('hidden');
      }
    }

    if (enterLobbyBtn) {
      enterLobbyBtn.addEventListener('click', openLobby);
    }

    const startView = new URLSearchParams(window.location.search).get('view');
    if (startView === 'lobby' || window.location.hash === '#lobby') {
      openLobby();
    }

    function applyFighterToPanel(card, side) {
      if (!card) {
        return;
      }

      const name = card.dataset.name || 'Fighter';
      const image = card.dataset.image || '';
      const lvl = card.dataset.lvl || '20';
      const str = card.dataset.str || '0';
      const abl = card.dataset.abl || '0';
      const hp = card.dataset.hp || '0';

      if (side === 'left') {
        leftName.textContent = name.toUpperCase();
        leftPortraitImage.src = image || leftPortraitImage.src;
        leftPortraitImage.alt = `${name} portrait`;
        leftStatLvl.textContent = lvl;
        leftStatStr.textContent = str;
        leftStatAbl.textContent = abl;
        leftStatHp.textContent = hp;

        leftPortraitImage.classList.remove('swap');
        void leftPortraitImage.offsetWidth;
        leftPortraitImage.classList.add('swap');
        return;
      }

      rightName.textContent = name.toUpperCase();
      rightPortraitImage.src = image || rightPortraitImage.src;
      rightPortraitImage.alt = `${name} portrait`;
      rightStatLvl.textContent = lvl;
      rightStatStr.textContent = str;
      rightStatAbl.textContent = abl;
      rightStatHp.textContent = hp;

      rightPortraitImage.classList.remove('swap');
      void rightPortraitImage.offsetWidth;
      rightPortraitImage.classList.add('swap');
    }

    function chooseRandomOpponent(selectedCard) {
      const pool = Array.from(rosterCards);
      if (!pool.length) {
        return null;
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function setOpponentStatus(text) {
      if (!opponentStatus) {
        return;
      }
      opponentStatus.textContent = text;
    }

    function updateFightLink() {
      if (!enterFightLink) {
        return;
      }

      if (!selectedPlayerCard || !finalizedOpponentCard) {
        enterFightLink.classList.add('disabled');
        enterFightLink.href = 'fighter-game.html?v=cardscale2';
        return;
      }

      const playerId = selectedPlayerCard.dataset.id;
      const opponentId = finalizedOpponentCard.dataset.id;
      if (!playerId || !opponentId) {
        enterFightLink.classList.add('disabled');
        enterFightLink.href = 'fighter-game.html?v=cardscale2';
        return;
      }

      const params = new URLSearchParams();
      params.set('v', 'cardscale2');
      params.set('player', playerId);
      params.set('opponent', opponentId);
      enterFightLink.href = `fighter-game.html?${params.toString()}`;
      enterFightLink.classList.remove('disabled');
    }

    function clearOpponentPickTimers() {
      if (opponentCountdownInterval) {
        clearInterval(opponentCountdownInterval);
        opponentCountdownInterval = null;
      }
      if (opponentShuffleInterval) {
        clearInterval(opponentShuffleInterval);
        opponentShuffleInterval = null;
      }
      if (opponentFinalizeTimeout) {
        clearTimeout(opponentFinalizeTimeout);
        opponentFinalizeTimeout = null;
      }
    }

    function startRandomOpponentPick(selectedCard) {
      clearOpponentPickTimers();

      const pool = Array.from(rosterCards);
      if (!pool.length) {
        setOpponentStatus('No opponent available');
        return;
      }

      const pickFromPool = () => pool[Math.floor(Math.random() * pool.length)];
      latestOpponentPreview = pickFromPool();
      applyFighterToPanel(latestOpponentPreview, 'right');

      let remainingSeconds = Math.ceil(OPPONENT_SELECT_DURATION_MS / 1000);
      setOpponentStatus(`AI selecting: ${remainingSeconds}s`);
      finalizedOpponentCard = null;
      updateFightLink();

      opponentShuffleInterval = setInterval(() => {
        latestOpponentPreview = pickFromPool();
        applyFighterToPanel(latestOpponentPreview, 'right');
      }, OPPONENT_SHUFFLE_STEP_MS);

      opponentCountdownInterval = setInterval(() => {
        remainingSeconds = Math.max(0, remainingSeconds - 1);
        setOpponentStatus(`AI selecting: ${remainingSeconds}s`);
      }, 1000);

      opponentFinalizeTimeout = setTimeout(() => {
        clearOpponentPickTimers();
        const finalOpponent = latestOpponentPreview || pickFromPool();
        applyFighterToPanel(finalOpponent, 'right');
        finalizedOpponentCard = finalOpponent;
        const finalName = (finalOpponent.dataset.name || 'Opponent').toUpperCase();
        setOpponentStatus(`AI opponent ready: ${finalName}`);
        updateFightLink();
      }, OPPONENT_SELECT_DURATION_MS);
    }

    function selectCard(card) {
      rosterCards.forEach((entry) => {
        const active = entry === card;
        entry.classList.toggle('active', active);
        entry.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      selectedPlayerCard = card;
      applyFighterToPanel(card, 'left');
      startRandomOpponentPick(card);
    }

    rosterCards.forEach((card) => {
      card.addEventListener('click', () => selectCard(card));
    });

    const defaultCard = rosterCards.find((card) => card.classList.contains('active')) || rosterCards[0];
    if (defaultCard) {
      selectCard(defaultCard);
    }

    if (enterFightLink) {
      enterFightLink.addEventListener('click', (event) => {
        if (!selectedPlayerCard || !finalizedOpponentCard) {
          event.preventDefault();
          setOpponentStatus('Wait for AI opponent lock...');
        }
      });
    }
  </script>
</body>
</html>
