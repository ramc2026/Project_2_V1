<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil Rig Simulations - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-top: #9cc3ff;
      --sky-bottom: #6ea4f6;
      --ground: #75522f;
      --ground-line: #5a3d23;
      --panel: #f6efdd;
      --text: #1b1c22;
      --btn: #cf7e1b;
      --btn-hover: #ab5d00;
      --outline: #1f212a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Press Start 2P", monospace;
      color: var(--text);
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.1) 0 3px, transparent 3px 6px),
        linear-gradient(var(--sky-top), var(--sky-bottom) 66%, var(--ground) 66%, var(--ground) 100%);
      padding: 24px;
      image-rendering: pixelated;
      letter-spacing: 0.2px;
    }

    .home-card {
      width: min(620px, 100%);
      background: var(--panel);
      border: 4px solid var(--outline);
      box-shadow: 8px 8px 0 var(--outline);
      padding: 30px;
      text-align: center;
      position: relative;
    }

    .home-card::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 10px;
      background: repeating-linear-gradient(90deg, transparent 0 6px, var(--ground-line) 6px 12px);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: clamp(1.8rem, 3.8vw, 2.4rem);
      line-height: 1.2;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      line-height: 1.7;
      font-size: clamp(0.6rem, 1.5vw, 0.72rem);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-right-link {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 1000;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      border: 3px solid var(--outline);
      font-weight: 700;
      font-size: 0.62rem;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.08s steps(2), background-color 0.08s steps(2);
      box-shadow: 4px 4px 0 var(--outline);
      line-height: 1.4;
    }

    .button.primary {
      background: var(--btn);
      color: #ffffff;
    }

    .button.primary:hover,
    .button.primary:focus-visible {
      background: var(--btn-hover);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--outline);
    }

    @media (max-width: 640px) {
      .home-card {
        padding: 20px;
      }

      h1 {
        font-size: 1.3rem;
      }

      .button {
        width: 100%;
      }

      .top-right-link {
        position: static;
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <a class="button primary top-right-link" href="fighter-game.html?v=cardscale2">Rig Arena Fight Game</a>
  <main class="home-card">
    <h1>Oil Rig Simulation Home</h1>
    <p>Select a simulation to explore how onshore and offshore oil extraction systems operate.</p>
    <div class="actions">
      <a class="button primary" href="simulation.html">Draggable Pump Simulation</a>
      <a class="button primary" href="oil-platform.html">Oil Platform Simulation</a>
    </div>
  </main>
</body>
</html>
