<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rig Arena - Fight Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b0f1b;
      --bg-mid: #10243a;
      --bg-sand: #c49a52;
      --ink: #081116;
      --neon: #ff5533;
      --neon-2: #ffd166;
      --panel: rgba(6, 11, 22, 0.86);
      --panel-border: #2d4159;
      --text: #eff6ff;
      --hero: #1e89ff;
      --enemy: #f03f53;
      --accent: #7be0ff;
      --good: #5df56b;
      --warn: #ffc145;
      --danger: #ff4d4d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Rajdhani", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 8%, rgba(255, 209, 102, 0.24), transparent 20%),
        radial-gradient(circle at 90% 20%, rgba(255, 85, 51, 0.25), transparent 28%),
        linear-gradient(180deg, #12243d 0%, #1c3452 44%, #7a5d2f 44%, #9a783f 100%);
      display: grid;
      place-items: center;
      padding: 14px;
      overflow-x: hidden;
    }

    .home-link {
      position: fixed;
      top: 14px;
      left: 14px;
      text-decoration: none;
      color: #fff;
      border: 2px solid #ffffff;
      background: linear-gradient(180deg, #1e3148, #132235);
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 0.06em;
      z-index: 1000;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .home-link:hover,
    .home-link:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.12);
    }

    .game-wrap {
      width: min(1020px, 100%);
      position: relative;
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 20%),
        var(--panel);
      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.45),
        inset 0 0 0 2px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .character-select {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      align-content: center;
      gap: 16px;
      overflow-y: auto;
      padding: clamp(14px, 3vw, 24px);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 229, 156, 0.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255, 90, 90, 0.2), transparent 28%),
        rgba(4, 9, 17, 0.95);
    }

    .character-select.hidden {
      display: none;
    }

    .select-title {
      margin: 0;
      text-align: center;
      font-family: "Bangers", "Impact", sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      letter-spacing: 0.1em;
      color: #ffe8ab;
      text-shadow: 0 0 14px rgba(255, 223, 130, 0.6);
    }

    .select-subtitle {
      margin: 0;
      text-align: center;
      font-size: 1rem;
      opacity: 0.86;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .character-card {
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 12px;
      text-align: left;
      background: linear-gradient(180deg, rgba(44, 73, 106, 0.4), rgba(16, 28, 45, 0.55));
      color: #e9f3ff;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: center;
    }

    .card-sprite {
      width: 90px;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .card-sprite svg {
      width: 100%;
      height: 100%;
    }

    .card-sprite img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #flashSpriteImage,
    #glSpriteImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      transform: scale(1.65);
      transform-origin: center bottom;
    }

    .card-text {
      display: grid;
      gap: 4px;
    }

    .character-card:hover,
    .character-card:focus-visible {
      transform: translateY(-2px);
      border-color: #ffe089;
      box-shadow: 0 0 0 2px rgba(255, 224, 137, 0.2);
    }

    .character-card.active {
      border-color: #ffe089;
      box-shadow: 0 0 0 3px rgba(255, 224, 137, 0.26);
      background: linear-gradient(180deg, rgba(56, 93, 133, 0.58), rgba(22, 38, 58, 0.8));
    }

    .card-title {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.06em;
      font-size: 1.26rem;
    }

    .card-tag {
      margin: 4px 0 8px;
      font-size: 0.94rem;
      color: #93d8ff;
      letter-spacing: 0.03em;
    }

    .card-stats {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.92;
      line-height: 1.35;
    }

    .select-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .select-start {
      border: 2px solid #ffffff;
      border-radius: 8px;
      font-size: 1rem;
      padding: 10px 14px;
      color: #fff;
      background: linear-gradient(180deg, #e1643f, #bb3c2a);
      font-weight: 700;
      cursor: pointer;
    }

    .select-hint {
      margin: 0;
      text-align: center;
      color: #ffd6bf;
      min-height: 20px;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 2px solid var(--panel-border);
      background: linear-gradient(90deg, rgba(255, 77, 77, 0.15), rgba(123, 224, 255, 0.12));
    }

    .fighter-panel {
      display: grid;
      gap: 6px;
    }

    .fighter-name {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.08em;
      font-size: clamp(1rem, 2.8vw, 1.4rem);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
    }

    .health-bar {
      height: 18px;
      border: 2px solid #cde4ff;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.14);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #6dff7f, #4fd95f);
      transition: width 0.2s ease;
    }

    .timer-box {
      text-align: center;
      border: 2px solid #fff;
      border-radius: 12px;
      padding: 6px 14px;
      min-width: 112px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.28));
    }

    .timer-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      opacity: 0.8;
      margin: 0;
    }

    .timer {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      font-size: clamp(1.5rem, 3.2vw, 2rem);
      color: var(--neon-2);
    }

    .arena {
      position: relative;
      height: min(60vh, 500px);
      min-height: 330px;
      overflow: hidden;
      isolation: isolate;
      border-bottom: 2px solid var(--panel-border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 34%),
        repeating-linear-gradient(90deg, rgba(255, 209, 102, 0.06) 0 16px, rgba(10, 14, 24, 0.04) 16px 32px),
        linear-gradient(180deg, #274c79 0 58%, #65461f 58% 100%);
    }

    .stage-sign {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.12em;
      color: #ffe8ab;
      font-size: clamp(1.1rem, 3vw, 1.9rem);
      text-shadow: 0 0 14px rgba(255, 237, 146, 0.75);
      z-index: 2;
    }

    .crowd {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 34%;
      height: 20%;
      background:
        radial-gradient(circle at 5% 60%, #1f2937 0 10%, transparent 11%),
        radial-gradient(circle at 12% 45%, #18212d 0 8%, transparent 9%),
        radial-gradient(circle at 20% 70%, #111a25 0 9%, transparent 10%),
        radial-gradient(circle at 30% 50%, #18212d 0 8%, transparent 9%),
        radial-gradient(circle at 40% 64%, #131c27 0 10%, transparent 11%),
        radial-gradient(circle at 52% 42%, #1b2736 0 8%, transparent 9%),
        radial-gradient(circle at 61% 68%, #121b26 0 9%, transparent 10%),
        radial-gradient(circle at 70% 46%, #1a2430 0 8%, transparent 9%),
        radial-gradient(circle at 80% 63%, #131c27 0 9%, transparent 10%),
        radial-gradient(circle at 90% 50%, #1b2736 0 8%, transparent 9%);
      opacity: 0.7;
      animation: crowdPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes crowdPulse {
      from { filter: brightness(0.9); }
      to { filter: brightness(1.08); }
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36%;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.07) 0 22px, transparent 22px 44px),
        linear-gradient(180deg, #816236, #5d3f1d);
    }

    .fighter {
      position: absolute;
      bottom: 30%;
      width: 72px;
      height: 138px;
      transition: filter 0.08s linear;
      --fighter-main: var(--hero);
      --fighter-limb: #203548;
    }

    .fighter.enemy {
      --fighter-main: var(--enemy);
      --fighter-limb: #511726;
    }

    .fighter.hit {
      filter: brightness(1.5) saturate(1.2);
    }

    .fighter .shadow {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -8px;
      height: 12px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 999px;
      filter: blur(1px);
      transform: scaleX(1);
    }

    .fighter .body {
      position: absolute;
      left: 18px;
      bottom: 24px;
      width: 36px;
      height: 62px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--fighter-main);
    }

    .fighter .head {
      position: absolute;
      left: 20px;
      bottom: 90px;
      width: 32px;
      height: 32px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #ffd6ae;
    }

    .fighter .arm,
    .fighter .leg {
      position: absolute;
      border: 2px solid var(--ink);
      background: var(--fighter-limb);
      border-radius: 6px;
      transform-origin: top center;
      transition: transform 0.06s ease;
    }

    .fighter .arm.left {
      left: 6px;
      bottom: 56px;
      width: 14px;
      height: 42px;
    }

    .fighter .arm.right {
      right: 6px;
      bottom: 56px;
      width: 14px;
      height: 42px;
    }

    .fighter .leg.left {
      left: 16px;
      bottom: 0;
      width: 14px;
      height: 42px;
    }

    .fighter .leg.right {
      right: 16px;
      bottom: 0;
      width: 14px;
      height: 42px;
    }

    .fighter.punching .arm.right,
    .fighter.enemy.punching .arm.left {
      transform: rotate(-95deg) translateY(-8px);
      height: 44px;
    }

    .fighter.kicking .leg.right,
    .fighter.enemy.kicking .leg.left {
      transform: rotate(-84deg) translateY(-10px);
      height: 46px;
    }

    .fighter.jumping {
      animation: hop 0.55s ease;
    }

    @keyframes hop {
      0% { transform: translateY(0); }
      50% { transform: translateY(-104px); }
      100% { transform: translateY(0); }
    }

    .impact {
      position: absolute;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 3px solid var(--neon-2);
      box-shadow: 0 0 20px rgba(255, 237, 146, 0.7);
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .impact.show {
      animation: impactFlash 0.22s ease;
    }

    @keyframes impactFlash {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.35);
      }
    }

    .message {
      margin: 0;
      text-align: center;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.08em;
      color: #ffe8ab;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      min-height: 38px;
      padding: 10px 12px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      padding: 12px 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(7, 14, 28, 0.7), rgba(7, 14, 28, 0.9));
    }

    .keys {
      margin: 0;
      display: grid;
      gap: 4px;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .keys strong {
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button {
      border: 2px solid #ffffff;
      color: #fff;
      border-radius: 8px;
      background: linear-gradient(180deg, #1d3a57, #122236);
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.14);
    }

    .mobile-controls {
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 0 14px 16px;
    }

    .mobile-controls button {
      min-height: 42px;
      font-size: 0.88rem;
      border-radius: 10px;
      background: linear-gradient(180deg, #2c4a67, #17273a);
    }

    .mobile-controls button.punch {
      background: linear-gradient(180deg, #e1643f, #bb3c2a);
    }

    .mobile-controls button.kick {
      background: linear-gradient(180deg, #f6b84c, #ce8a1d);
    }

    .mobile-controls button.jump {
      background: linear-gradient(180deg, #4f9ef8, #2f6fd0);
    }

    @media (max-width: 900px) {
      .hud {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .timer-box {
        justify-self: center;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .action-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .character-grid {
        grid-template-columns: 1fr;
      }

      .arena {
        height: 54vh;
      }

      .keys {
        font-size: 0.88rem;
      }

      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>

  <a class="home-link" href="index.html">Home</a>

  <main class="game-wrap" aria-label="Rig Arena fighting game">

          <div class="card-sprite">
            <svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="40" cy="18" r="13" fill="#9a9a9a" stroke="#1a1a1a" stroke-width="1.5" />
              <rect x="22" y="34" width="36" height="46" rx="6" fill="#7f7f7f" stroke="#1a1a1a" stroke-width="2" />
              <path d="M 24 40 L 16 50" stroke="#d9d9d9" stroke-width="2" />
              <path d="M 56 40 L 64 50" stroke="#d9d9d9" stroke-width="2" />
              <rect x="16" y="44" width="10" height="30" rx="4" fill="#4c4c4c" />
              <rect x="54" y="44" width="10" height="30" rx="4" fill="#4c4c4c" />
              <rect x="29" y="82" width="8" height="34" rx="3" fill="#4c4c4c" />
              <rect x="43" y="82" width="8" height="34" rx="3" fill="#4c4c4c" />
            </svg>
          </div>
          <div class="card-text">
            <p class="card-title">Doomsday</p>
            <p class="card-tag">Kryptonian Slayer</p>
            <p class="card-stats">Punch: Ultra | Kick: Ultra | Speed: Low</p>
          </div>
        </button>
      </div>
      <div class="select-actions">
        <button class="select-start" id="startFightBtn" type="button">Start Fight</button>
      </div>
      <p class="select-hint" id="selectHint">Select a fighter to continue.</p>
    </section>

    <section class="hud">
      <article class="fighter-panel">
        <h1 class="fighter-name" id="playerName">RIG RUNNER</h1>
        <div class="health-bar" aria-label="Player health">
          <div class="health-fill" id="playerHealth"></div>
        </div>
      </article>

      <article class="timer-box" aria-live="polite">
        <p class="timer-label">ROUND TIMER</p>
        <p class="timer" id="timer">60</p>
      </article>

      <article class="fighter-panel">
        <h2 class="fighter-name" id="enemyName" style="text-align:right;">NIGHT RAIDER</h2>
        <div class="health-bar" aria-label="Enemy health">
          <div class="health-fill" id="enemyHealth"></div>
        </div>
      </article>
    </section>

    <section class="arena" id="arena" aria-label="Fight arena">
      <div class="stage-sign">RIG ARENA</div>
      <div class="crowd" aria-hidden="true"></div>
      <div class="ground" aria-hidden="true"></div>

      <div class="fighter" id="player" style="left: 100px;">
        <div class="shadow"></div>
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>

      <div class="fighter enemy" id="enemy" style="left: 640px;">
        <div class="shadow"></div>
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>

      <div class="impact" id="impact"></div>
    </section>

    <p class="message" id="message" aria-live="polite">Fight! Use movement and combo attacks.</p>

    <section class="controls">
      <p class="keys">
        <strong>Desktop Controls:</strong>
        A/D move, W jump, F punch, G kick
      </p>
      <div class="action-row">
        <button id="resetBtn" type="button">Reset Round</button>
      </div>
    </section>

    <section class="mobile-controls" aria-label="Touch controls">
      <button data-action="left" type="button">Left</button>
      <button data-action="right" type="button">Right</button>
      <button class="jump" data-action="jump" type="button">Jump</button>
      <button class="punch" data-action="punch" type="button">Punch</button>
      <button class="kick" data-action="kick" type="button">Kick</button>
    </section>
  </main>

  <script>
    const arena = document.getElementById("arena");
    const playerEl = document.getElementById("player");
    const enemyEl = document.getElementById("enemy");
    const timerEl = document.getElementById("timer");
    const playerHealthEl = document.getElementById("playerHealth");
    const enemyHealthEl = document.getElementById("enemyHealth");
    const playerNameEl = document.getElementById("playerName");
    const enemyNameEl = document.getElementById("enemyName");
    const messageEl = document.getElementById("message");
    const impactEl = document.getElementById("impact");
    const resetBtn = document.getElementById("resetBtn");
    const mobileButtons = Array.from(document.querySelectorAll(".mobile-controls button"));
    const characterSelectEl = document.getElementById("characterSelect");
    const selectHintEl = document.getElementById("selectHint");
    const startFightBtn = document.getElementById("startFightBtn");
    const characterCards = Array.from(document.querySelectorAll(".character-card"));

    const characterRoster = [
      {
        id: "flash",
        name: "Flash",
        bodyColor: "#cc0000",
        limbColor: "#990000",
        punchBonus: -1,
        kickBonus: -1,
        moveBonus: 8
      },
      {
        id: "green-lantern",
        name: "Green Lantern",
        bodyColor: "#00a86b",
        limbColor: "#004d2d",
        punchBonus: 3,
        kickBonus: 4,
        moveBonus: 1
      },
      {
        id: "hawkgirl",
        name: "Hawkgirl",
        bodyColor: "#c69a42",
        limbColor: "#7a5b21",
        punchBonus: 2,
        kickBonus: 3,
        moveBonus: 4
      },
      {
        id: "killercroc",
        name: "Killer Croc",
        bodyColor: "#3f6b42",
        limbColor: "#2c4b2f",
        punchBonus: 5,
        kickBonus: 5,
        moveBonus: -2
      },
      {
        id: "sinestro",
        name: "Sinestro",
        bodyColor: "#d9c019",
        limbColor: "#5f4f00",
        punchBonus: 3,
        kickBonus: 2,
        moveBonus: 2
      },
      {
        id: "doomsday",
        name: "Doomsday",
        bodyColor: "#7f7f7f",
        limbColor: "#4c4c4c",
        punchBonus: 6,
        kickBonus: 6,
        moveBonus: -3
      }
    ];

    const state = {
      arenaWidth: 920,
      playerX: 100,
      enemyX: 640,
      moveStep: 26,
      jumpLock: false,
      playerHealth: 100,
      enemyHealth: 100,
      selectedCharacterId: "",
      selectedCharacter: null,
      enemyCharacter: null,
      playerPunchBonus: 0,
      playerKickBonus: 0,
      enemyPunchBonus: 0,
      enemyKickBonus: 0,
      canAttack: true,
      enemyCanAttack: true,
      timer: 60,
      roundActive: false,
      selectionLocked: false,
      enemyBrain: null,
      timerInterval: null
    };

    const attackConfig = {
      punch: { damage: 10, range: 105, cooldown: 360, className: "punching" },
      kick: { damage: 14, range: 120, cooldown: 560, className: "kicking" }
    };

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function getCharacterById(id) {
      return characterRoster.find((character) => character.id === id) || null;
    }

    function chooseEnemyCharacter(playerCharacterId) {
      const options = characterRoster.filter((character) => character.id !== playerCharacterId);
      return options[Math.floor(Math.random() * options.length)] || characterRoster[0];
    }

    function applyFighterStyle(element, character) {
      element.style.setProperty("--fighter-main", character.bodyColor);
      element.style.setProperty("--fighter-limb", character.limbColor);
    }

    function highlightSelectedCard() {
      characterCards.forEach((card) => {
        const isActive = card.getAttribute("data-character") === state.selectedCharacterId;
        card.classList.toggle("active", isActive);
      });
    }

    function configureSelectedFighters() {
      const selected = getCharacterById(state.selectedCharacterId);
      if (!selected) {
        return false;
      }

      const enemy = chooseEnemyCharacter(selected.id);
      state.selectedCharacter = selected;
      state.enemyCharacter = enemy;

      state.playerPunchBonus = selected.punchBonus;
      state.playerKickBonus = selected.kickBonus;
      state.enemyPunchBonus = enemy.punchBonus;
      state.enemyKickBonus = enemy.kickBonus;
      state.moveStep = clamp(26 + selected.moveBonus, 20, 34);

      playerNameEl.textContent = selected.name.toUpperCase();
      enemyNameEl.textContent = enemy.name.toUpperCase();

      applyFighterStyle(playerEl, selected);
      applyFighterStyle(enemyEl, enemy);
      return true;
    }

    function beginFight() {
      if (!state.selectedCharacterId) {
        selectHintEl.textContent = "Pick a fighter before starting the round.";
        return;
      }

      if (!configureSelectedFighters()) {
        selectHintEl.textContent = "Unable to load fighter. Try selecting again.";
        return;
      }

      state.selectionLocked = true;
      characterSelectEl.classList.add("hidden");
      setMessage("Fight! Use movement and combo attacks.");
      resetRound();
    }

    function updateArenaMetrics() {
      state.arenaWidth = arena.clientWidth;
      const maxX = state.arenaWidth - 78;
      state.playerX = clamp(state.playerX, 0, maxX);
      state.enemyX = clamp(state.enemyX, 0, maxX);
      renderPositions();
    }

    function renderPositions() {
      playerEl.style.left = state.playerX + "px";
      enemyEl.style.left = state.enemyX + "px";
    }

    function updateHealthBars() {
      playerHealthEl.style.width = state.playerHealth + "%";
      enemyHealthEl.style.width = state.enemyHealth + "%";

      playerHealthEl.style.background = healthGradient(state.playerHealth);
      enemyHealthEl.style.background = healthGradient(state.enemyHealth);
    }

    function healthGradient(value) {
      if (value <= 25) {
        return "linear-gradient(90deg, #ff4d4d, #c22828)";
      }
      if (value <= 55) {
        return "linear-gradient(90deg, #ffc145, #e49012)";
      }
      return "linear-gradient(90deg, #6dff7f, #4fd95f)";
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function showImpact(targetX) {
      const arenaRect = arena.getBoundingClientRect();
      const hitX = clamp(targetX, 16, state.arenaWidth - 16);
      impactEl.style.left = hitX + "px";
      impactEl.style.top = Math.round(arenaRect.height * 0.58) + "px";
      impactEl.classList.remove("show");
      void impactEl.offsetWidth;
      impactEl.classList.add("show");
    }

    function setHitFlash(element) {
      element.classList.add("hit");
      setTimeout(() => element.classList.remove("hit"), 120);
    }

    function performPlayerJump() {
      if (!state.roundActive || state.jumpLock) {
        return;
      }
      state.jumpLock = true;
      playerEl.classList.add("jumping");
      setTimeout(() => {
        playerEl.classList.remove("jumping");
        state.jumpLock = false;
      }, 560);
    }

    function movePlayer(direction) {
      if (!state.roundActive) {
        return;
      }
      const maxX = state.arenaWidth - 78;
      state.playerX = clamp(state.playerX + direction * state.moveStep, 0, maxX);
      renderPositions();
    }

    function isPlayerInRange(range) {
      return Math.abs((state.playerX + 36) - (state.enemyX + 36)) <= range;
    }

    function runAttackAnimation(element, className, duration) {
      element.classList.add(className);
      setTimeout(() => element.classList.remove(className), duration);
    }

    function playerAttack(type) {
      if (!state.roundActive || !state.canAttack) {
        return;
      }

      const attack = attackConfig[type];
      if (!attack) {
        return;
      }

      const damageBonus = type === "kick" ? state.playerKickBonus : state.playerPunchBonus;
      const damage = clamp(attack.damage + damageBonus, 4, 24);

      state.canAttack = false;
      runAttackAnimation(playerEl, attack.className, attack.cooldown - 80);

      if (isPlayerInRange(attack.range)) {
        state.enemyHealth = clamp(state.enemyHealth - damage, 0, 100);
        updateHealthBars();
        setHitFlash(enemyEl);
        showImpact(state.enemyX + 36);
        setMessage(type === "kick" ? "Heavy kick lands!" : "Clean punch!");
        evaluateRoundEnd();
      } else {
        setMessage("Attack missed. Close the distance.");
      }

      setTimeout(() => {
        state.canAttack = true;
      }, attack.cooldown);
    }

    function enemyAttack(type) {
      if (!state.roundActive || !state.enemyCanAttack) {
        return;
      }

      const attack = attackConfig[type];
      const damageBonus = type === "kick" ? state.enemyKickBonus : state.enemyPunchBonus;
      const damage = clamp(attack.damage + damageBonus, 4, 24);
      state.enemyCanAttack = false;
      runAttackAnimation(enemyEl, attack.className, attack.cooldown - 90);

      if (Math.abs((state.enemyX + 36) - (state.playerX + 36)) <= attack.range) {
        state.playerHealth = clamp(state.playerHealth - damage, 0, 100);
        updateHealthBars();
        setHitFlash(playerEl);
        showImpact(state.playerX + 36);
        setMessage(type === "kick" ? "Night Raider lands a kick!" : "Night Raider punches!");
        evaluateRoundEnd();
      }

      setTimeout(() => {
        state.enemyCanAttack = true;
      }, attack.cooldown + 120);
    }

    function enemyAI() {
      if (!state.roundActive) {
        return;
      }

      const maxX = state.arenaWidth - 78;
      const distance = (state.playerX + 36) - (state.enemyX + 36);
      const absDistance = Math.abs(distance);

      if (absDistance > 96) {
        const step = absDistance > 220 ? 24 : 16;
        state.enemyX = clamp(state.enemyX + Math.sign(distance) * step, 0, maxX);
        renderPositions();
      } else if (state.enemyCanAttack) {
        const move = Math.random();
        if (move < 0.55) {
          enemyAttack("punch");
        } else {
          enemyAttack("kick");
        }
      }
    }

    function evaluateRoundEnd() {
      if (state.playerHealth <= 0 || state.enemyHealth <= 0 || state.timer <= 0) {
        finishRound();
      }
    }

    function finishRound() {
      if (!state.roundActive) {
        return;
      }

      state.roundActive = false;
      clearInterval(state.enemyBrain);
      clearInterval(state.timerInterval);

      if (state.playerHealth === state.enemyHealth) {
        setMessage("Draw game. Reset and run it back.");
      } else if (state.playerHealth > state.enemyHealth) {
        setMessage("You win the round! Arena champion.");
      } else {
        setMessage("Night Raider wins. Try a rematch.");
      }
    }

    function startRoundClock() {
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        if (!state.roundActive) {
          return;
        }
        state.timer -= 1;
        timerEl.textContent = state.timer;
        if (state.timer <= 10) {
          timerEl.style.color = "#ff6f6f";
        }
        if (state.timer <= 0) {
          state.timer = 0;
          timerEl.textContent = "0";
          finishRound();
        }
      }, 1000);
    }

    function startEnemyBrain() {
      clearInterval(state.enemyBrain);
      state.enemyBrain = setInterval(enemyAI, 420);
    }

    function resetRound() {
      if (!state.selectionLocked) {
        return;
      }

      clearInterval(state.enemyBrain);
      clearInterval(state.timerInterval);

      state.playerX = 100;
      state.enemyX = Math.max(state.arenaWidth - 210, 380);
      state.playerHealth = 100;
      state.enemyHealth = 100;
      state.jumpLock = false;
      state.canAttack = true;
      state.enemyCanAttack = true;
      state.timer = 60;
      state.roundActive = true;

      timerEl.textContent = "60";
      timerEl.style.color = "#ffd166";
      renderPositions();
      updateHealthBars();
      setMessage("Fight! Use movement and combo attacks.");
      startRoundClock();
      startEnemyBrain();
    }

    function processSpriteTransparency(imageId) {
      const spriteImage = document.getElementById(imageId);
      if (!spriteImage) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = sourceImage.naturalWidth;
        canvas.height = sourceImage.naturalHeight;
        const context = canvas.getContext("2d");

        if (!context) {
          return;
        }

        context.drawImage(sourceImage, 0, 0);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = frame.data;

        for (let i = 0; i < pixels.length; i += 4) {
          const r = pixels[i];
          const g = pixels[i + 1];
          const b = pixels[i + 2];
          const a = pixels[i + 3];
          const min = Math.min(r, g, b);
          const max = Math.max(r, g, b);
          const lowColorSpread = max - min <= 16;

          if (min >= 246) {
            pixels[i + 3] = 0;
          } else if (min >= 224 && lowColorSpread) {
            const fadeRatio = (246 - min) / 22;
            pixels[i + 3] = Math.max(0, Math.min(255, Math.round(a * fadeRatio)));
          }
        }

        context.putImageData(frame, 0, 0);

        // Trim transparent borders so the sprite fills the card instead of staying tiny.
        let minX = canvas.width;
        let minY = canvas.height;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < canvas.height; y += 1) {
          for (let x = 0; x < canvas.width; x += 1) {
            const alpha = pixels[(y * canvas.width + x) * 4 + 3];
            if (alpha > 8) {
              if (x < minX) minX = x;
              if (y < minY) minY = y;
              if (x > maxX) maxX = x;
              if (y > maxY) maxY = y;
            }
          }
        }

        if (maxX > minX && maxY > minY) {
          const pad = 6;
          const cropX = Math.max(0, minX - pad);
          const cropY = Math.max(0, minY - pad);
          const cropW = Math.min(canvas.width - cropX, (maxX - minX + 1) + pad * 2);
          const cropH = Math.min(canvas.height - cropY, (maxY - minY + 1) + pad * 2);

          const croppedCanvas = document.createElement("canvas");
          croppedCanvas.width = cropW;
          croppedCanvas.height = cropH;
          const croppedContext = croppedCanvas.getContext("2d");

          if (croppedContext) {
            croppedContext.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            spriteImage.src = croppedCanvas.toDataURL("image/png");
            return;
          }
        }

        spriteImage.src = canvas.toDataURL("image/png");
      };

      sourceImage.src = spriteImage.src;
    }

    function cleanupGreenLanternCard(imageId) {
      const spriteImage = document.getElementById(imageId);
      if (!spriteImage) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = sourceImage.naturalWidth;
        canvas.height = sourceImage.naturalHeight;
        const context = canvas.getContext("2d");

        if (!context) {
          return;
        }

        context.drawImage(sourceImage, 0, 0);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = frame.data;
        const width = canvas.width;
        const height = canvas.height;

        const rowOpaque = new Array(height).fill(0);
        const rowDark = new Array(height).fill(0);
        const colOpaque = new Array(width).fill(0);
        const colDark = new Array(width).fill(0);

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const i = (y * width + x) * 4;
            const r = pixels[i];
            const g = pixels[i + 1];
            const b = pixels[i + 2];
            const a = pixels[i + 3];

            if (a <= 20) {
              continue;
            }

            rowOpaque[y] += 1;
            colOpaque[x] += 1;

            const darkGuidePixel = r < 58 && g < 78 && b < 92;
            if (darkGuidePixel) {
              rowDark[y] += 1;
              colDark[x] += 1;
            }
          }
        }

        const guideRows = new Array(height).fill(false);
        const guideCols = new Array(width).fill(false);

        for (let y = 0; y < height; y += 1) {
          if (rowOpaque[y] >= 8 && rowDark[y] / rowOpaque[y] >= 0.72) {
            guideRows[y] = true;
          }
        }

        for (let x = 0; x < width; x += 1) {
          if (colOpaque[x] >= 8 && colDark[x] / colOpaque[x] >= 0.72) {
            guideCols[x] = true;
          }
        }

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            if (!guideRows[y] && !guideCols[x]) {
              continue;
            }

            const i = (y * width + x) * 4;
            const r = pixels[i];
            const g = pixels[i + 1];
            const b = pixels[i + 2];
            const a = pixels[i + 3];

            if (a <= 20) {
              continue;
            }

            const darkGuidePixel = r < 68 && g < 88 && b < 102;
            if (darkGuidePixel) {
              pixels[i + 3] = 0;
            }
          }
        }

        context.putImageData(frame, 0, 0);
        spriteImage.src = canvas.toDataURL("image/png");
      };

      sourceImage.src = spriteImage.src;
    }

    function handleInputAction(action) {
      switch (action) {
        case "left":
          movePlayer(-1);
          break;
        case "right":
          movePlayer(1);
          break;
        case "jump":
          performPlayerJump();
          break;
        case "punch":
          playerAttack("punch");
          break;
        case "kick":
          playerAttack("kick");
          break;
        default:
          break;
      }
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["a", "d", "w", "f", "g"].includes(key)) {
        event.preventDefault();
      }

      if (key === "a") {
        handleInputAction("left");
      }
      if (key === "d") {
        handleInputAction("right");
      }
      if (key === "w") {
        handleInputAction("jump");
      }
      if (key === "f") {
        handleInputAction("punch");
      }
      if (key === "g") {
        handleInputAction("kick");
      }
    });

    mobileButtons.forEach((button) => {
      const action = button.getAttribute("data-action");
      button.addEventListener("click", () => handleInputAction(action));
    });

    characterCards.forEach((card) => {
      card.addEventListener("click", () => {
        state.selectedCharacterId = card.getAttribute("data-character") || "";
        selectHintEl.textContent = "";
        highlightSelectedCard();
      });
    });

    resetBtn.addEventListener("click", resetRound);
    startFightBtn.addEventListener("click", beginFight);
    window.addEventListener("resize", updateArenaMetrics);

    const flashSprite = document.getElementById("flashSpriteImage");
    const greenLanternSprite = document.getElementById("glSpriteImage");

    // Runtime fallback so card sprite scale is correct even if stale CSS is cached.
    [flashSprite, greenLanternSprite].forEach((img) => {
      if (!img) {
        return;
      }
      img.style.transform = "scale(1.65)";
      img.style.transformOrigin = "center bottom";
      img.style.objectFit = "contain";
      img.style.objectPosition = "center bottom";
    });

    if (flashSprite && /placeholder/i.test(flashSprite.getAttribute("src") || "")) {
      processSpriteTransparency("flashSpriteImage");
    }
    if (greenLanternSprite && /placeholder/i.test(greenLanternSprite.getAttribute("src") || "")) {
      processSpriteTransparency("glSpriteImage");
    }
    if (greenLanternSprite) {
      cleanupGreenLanternCard("glSpriteImage");
    }
    updateArenaMetrics();
    setMessage("Select your fighter to begin.");
  </script>
</body>
</html>
