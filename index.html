<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil Rig Pump Simulation</title>
  <style>
    :root {
      --sky: #d9efff;
      --ground: #66422a;
      --metal: #425769;
      --accent: #e89a28;
      --oil: #141414;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(var(--sky) 70%, var(--ground) 70%);
      color: #1d2a35;
    }

    .scene {
      width: min(900px, 95vw);
      display: grid;
      gap: 14px;
      grid-template-columns: 2fr 1fr;
      align-items: end;
    }

    .rig-area {
      height: 460px;
      position: relative;
    }

    .tower {
      position: absolute;
      left: 56px;
      bottom: 50px;
      width: 130px;
      height: 300px;
      border: 8px solid var(--metal);
      border-bottom: 14px solid var(--metal);
      clip-path: polygon(12% 100%, 88% 100%, 60% 0, 40% 0);
      background: repeating-linear-gradient(
        -55deg,
        transparent 0 14px,
        rgba(66, 87, 105, 0.4) 14px 24px
      );
    }

    .pump-base {
      position: absolute;
      left: 225px;
      bottom: 82px;
      width: 220px;
      height: 26px;
      background: var(--metal);
      border-radius: 8px;
    }

    .pump-pivot {
      position: absolute;
      left: 255px;
      bottom: 90px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2e3d49;
      z-index: 2;
    }

    .pump-arm {
      position: absolute;
      left: 260px;
      bottom: 100px;
      width: 170px;
      height: 16px;
      background: var(--accent);
      border-radius: 8px;
      transform-origin: 0 50%;
      transform: rotate(0deg);
      transition: transform 80ms linear;
    }

    .pump-handle {
      position: absolute;
      right: -8px;
      top: -12px;
      width: 34px;
      height: 40px;
      background: #f6be55;
      border: 3px solid #754b11;
      border-radius: 8px;
      cursor: grab;
      touch-action: none;
      display: grid;
      place-items: center;
      color: #533507;
      font-size: 12px;
      font-weight: bold;
      user-select: none;
    }

    .pump-handle:active { cursor: grabbing; }

    .well {
      position: absolute;
      left: 454px;
      bottom: 48px;
      width: 42px;
      height: 160px;
      border: 7px solid var(--metal);
      border-top: 0;
      background: linear-gradient(#2b2b2b 0 0) bottom / 100% 0% no-repeat #8f765e;
      border-radius: 0 0 10px 10px;
      transition: background-size 120ms linear;
    }

    .info {
      background: var(--panel);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      align-self: start;
    }

    .meter {
      width: 100%;
      height: 20px;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f1f1f, #3f3f3f);
      transition: width 100ms linear;
    }
  </style>
</head>
<body>
  <main class="scene">
    <section class="rig-area">
      <div class="tower" aria-hidden="true"></div>
      <div class="pump-base" aria-hidden="true"></div>
      <div class="pump-pivot" aria-hidden="true"></div>
      <div class="pump-arm" id="pumpArm">
        <div class="pump-handle" id="pumpHandle">DRAG</div>
      </div>
      <div class="well" id="well" aria-hidden="true"></div>
    </section>

    <aside class="info">
      <h2>Oil Extraction</h2>
      <p>Drag the pump handle up and down.</p>
      <p><strong>Pump Strokes:</strong> <span id="strokes">0</span></p>
      <p><strong>Oil Extracted:</strong> <span id="oilAmount">0</span> barrels</p>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
    </aside>
  </main>

  <script>
    const handle = document.getElementById("pumpHandle");
    const arm = document.getElementById("pumpArm");
    const strokesEl = document.getElementById("strokes");
    const oilAmountEl = document.getElementById("oilAmount");
    const meterFill = document.getElementById("meterFill");
    const well = document.getElementById("well");

    let dragging = false;
    let lastY = 0;
    let displacement = 0;
    let strokeAccumulator = 0;
    let strokes = 0;
    let oilAmount = 0;

    function render() {
      const normalized = Math.max(-1, Math.min(1, displacement / 48));
      arm.style.transform = `rotate(${normalized * 13}deg)`;
      const fill = Math.min(100, oilAmount / 2);
      meterFill.style.width = `${fill}%`;
      well.style.backgroundSize = `100% ${fill}%`;
      strokesEl.textContent = strokes;
      oilAmountEl.textContent = oilAmount.toFixed(1);
    }

    handle.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastY = event.clientY;
      handle.setPointerCapture(event.pointerId);
    });

    handle.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const deltaY = event.clientY - lastY;
      lastY = event.clientY;
      displacement = Math.max(-48, Math.min(48, displacement + deltaY));
      strokeAccumulator += Math.abs(deltaY);
      if (strokeAccumulator >= 70) {
        strokeAccumulator = 0;
        strokes += 1;
        oilAmount += 2.5;
      }
      render();
    });

    function release() {
      dragging = false;
      displacement = 0;
      render();
    }

    handle.addEventListener("pointerup", release);
    handle.addEventListener("pointercancel", release);

    render();
  </script>
</body>
</html>
