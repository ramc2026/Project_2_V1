<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil Rig Pump Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #9cc3ff;
      --ground: #75522f;
      --metal: #3f5064;
      --accent: #d48a2d;
      --oil: #141414;
      --panel: #f6efdd;
      --home-btn: #2b698f;
      --home-btn-hover: #1d4f6d;
      --outline: #1f212a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Press Start 2P", monospace;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 3px, transparent 3px 6px),
        linear-gradient(var(--sky) 70%, var(--ground) 70%);
      color: #1d2a35;
      padding: 16px;
      image-rendering: pixelated;
      letter-spacing: 0.2px;
    }

    .home-link {
      position: fixed;
      top: 14px;
      left: 14px;
      display: inline-block;
      background: var(--home-btn);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 14px;
      border: 3px solid var(--outline);
      box-shadow: 4px 4px 0 var(--outline);
      font-size: 0.56rem;
      transition: transform 0.08s steps(2), background-color 0.08s steps(2);
      z-index: 1000;
    }

    .home-link:hover,
    .home-link:focus-visible {
      background: var(--home-btn-hover);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--outline);
    }

    .scene {
      width: min(900px, 95vw);
      display: grid;
      gap: 14px;
      grid-template-columns: 2fr 1fr;
      align-items: end;
    }

    .rig-area {
      height: 460px;
      position: relative;
    }

    .tower {
      position: absolute;
      left: 56px;
      bottom: 50px;
      width: 130px;
      height: 300px;
      border: 8px solid var(--metal);
      border-bottom: 14px solid var(--metal);
      clip-path: polygon(12% 100%, 88% 100%, 60% 0, 40% 0);
      background: repeating-linear-gradient(
        -55deg,
        transparent 0 14px,
        rgba(66, 87, 105, 0.4) 14px 24px
      );
      filter: drop-shadow(4px 4px 0 rgba(0, 0, 0, 0.28));
    }

    .pump-base {
      position: absolute;
      left: 225px;
      bottom: 82px;
      width: 220px;
      height: 26px;
      background: var(--metal);
      border: 3px solid #2b3948;
    }

    .pump-pivot {
      position: absolute;
      left: 255px;
      bottom: 90px;
      width: 16px;
      height: 16px;
      border-radius: 0;
      background: #2e3d49;
      z-index: 2;
      border: 2px solid #1f2730;
    }

    .pump-arm {
      position: absolute;
      left: 260px;
      bottom: 100px;
      width: 170px;
      height: 16px;
      background: var(--accent);
      border: 3px solid #9f5f0e;
      transform-origin: 0 50%;
      transform: rotate(0deg);
      transition: transform 80ms linear;
    }

    .pump-handle {
      position: absolute;
      right: -8px;
      top: -12px;
      width: 34px;
      height: 40px;
      background: #f6be55;
      border: 3px solid #754b11;
      border-radius: 0;
      cursor: grab;
      touch-action: none;
      display: grid;
      place-items: center;
      color: #533507;
      font-size: 9px;
      font-weight: bold;
      user-select: none;
    }

    .pump-handle:active { cursor: grabbing; }

    .well {
      position: absolute;
      left: 454px;
      bottom: 48px;
      width: 42px;
      height: 160px;
      border: 7px solid var(--metal);
      border-top: 0;
      background: linear-gradient(#2b2b2b 0 0) bottom / 100% 0% no-repeat #8f765e;
      border-radius: 0;
      transition: background-size 120ms linear;
    }

    .info {
      background: var(--panel);
      border: 4px solid var(--outline);
      padding: 16px;
      box-shadow: 8px 8px 0 var(--outline);
      align-self: start;
      line-height: 1.7;
      font-size: 0.58rem;
    }

    .info h2 {
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .meter {
      width: 100%;
      height: 20px;
      background: #ececec;
      border: 3px solid var(--outline);
      overflow: hidden;
      margin-top: 8px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f1f1f, #3f3f3f);
      transition: width 100ms linear;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      place-items: center;
      padding: 16px;
    }

    .modal.active {
      display: grid;
    }

    .modal-content {
      background: var(--panel);
      border: 6px solid var(--outline);
      padding: 32px;
      box-shadow: 12px 12px 0 var(--outline);
      text-align: center;
      max-width: 500px;
      line-height: 1.8;
      font-size: 0.64rem;
    }

    .modal-content h1 {
      font-size: 0.9rem;
      margin-top: 0;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .modal-content p {
      margin: 14px 0;
    }

    .process-btn {
      margin-top: 24px;
      padding: 14px 24px;
      border: 4px solid var(--outline);
      background: #2a8f2a;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.64rem;
      box-shadow: 6px 6px 0 var(--outline);
      transition: transform 0.08s steps(2), background-color 0.08s steps(2);
    }

    .process-btn:hover,
    .process-btn:focus-visible {
      background: #1f6a1f;
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 var(--outline);
    }

    @media (max-width: 900px) {
      .scene {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .rig-area {
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="home-link">Home</a>

  <div class="modal" id="processingModal">
    <div class="modal-content">
      <h1>Oil Storage Full!</h1>
      <p>You've extracted 1000 barrels of crude oil.</p>
      <p>The tank is now at capacity.</p>
      <p><strong>Ready to begin initial processing to extract gas, water, and refined crude?</strong></p>
      <button class="process-btn" id="processBtn">Begin Processing</button>
    </div>
  </div>

  <main class="scene">
    <section class="rig-area">
      <div class="tower" aria-hidden="true"></div>
      <div class="pump-base" aria-hidden="true"></div>
      <div class="pump-pivot" aria-hidden="true"></div>
      <div class="pump-arm" id="pumpArm">
        <div class="pump-handle" id="pumpHandle">DRAG</div>
      </div>
      <div class="well" id="well" aria-hidden="true"></div>
    </section>

    <aside class="info">
      <h2>Oil Extraction</h2>
      <p>Drag the pump handle up and down.</p>
      <p><strong>Pump Strokes:</strong> <span id="strokes">0</span></p>
      <p><strong>Oil Extracted:</strong> <span id="oilAmount">0</span> barrels</p>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
    </aside>
  </main>

  <script>
    const handle = document.getElementById("pumpHandle");
    const arm = document.getElementById("pumpArm");
    const strokesEl = document.getElementById("strokes");
    const oilAmountEl = document.getElementById("oilAmount");
    const meterFill = document.getElementById("meterFill");
    const well = document.getElementById("well");
    const processingModal = document.getElementById("processingModal");
    const processBtn = document.getElementById("processBtn");

    const OIL_LIMIT = 1000;
    let dragging = false;
    let lastY = 0;
    let displacement = 0;
    let strokeAccumulator = 0;
    let strokes = 0;
    let oilAmount = 0;
    let hasReachedLimit = false;

    function render() {
      const normalized = Math.max(-1, Math.min(1, displacement / 48));
      arm.style.transform = `rotate(${normalized * 13}deg)`;
      const fill = Math.min(100, (oilAmount / OIL_LIMIT) * 100);
      meterFill.style.width = `${fill}%`;
      well.style.backgroundSize = `100% ${fill}%`;
      strokesEl.textContent = strokes;
      oilAmountEl.textContent = oilAmount.toFixed(1);

      if (oilAmount >= OIL_LIMIT && !hasReachedLimit) {
        hasReachedLimit = true;
        showProcessingModal();
      }
    }

    function showProcessingModal() {
      processingModal.classList.add("active");
      handle.style.pointerEvents = "none";
    }

    handle.addEventListener("pointerdown", (event) => {
      if (oilAmount >= OIL_LIMIT) return;
      dragging = true;
      lastY = event.clientY;
      handle.setPointerCapture(event.pointerId);
    });

    handle.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const deltaY = event.clientY - lastY;
      lastY = event.clientY;
      displacement = Math.max(-48, Math.min(48, displacement + deltaY));
      strokeAccumulator += Math.abs(deltaY);
      if (strokeAccumulator >= 70 && oilAmount < OIL_LIMIT) {
        strokeAccumulator = 0;
        strokes += 1;
        oilAmount = Math.min(OIL_LIMIT, oilAmount + 2.5);
      }
      render();
    });

    function release() {
      dragging = false;
      displacement = 0;
      render();
    }

    handle.addEventListener("pointerup", release);
    handle.addEventListener("pointercancel", release);

    processBtn.addEventListener("click", () => {
      processingModal.classList.remove("active");
      alert("Processing initiated! Extracting gas and water from crude oil...");
    });

    render();
  </script>
</body>
</html>
