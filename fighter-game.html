<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rig Arena - Fight Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b0f1b;
      --bg-mid: #10243a;
      --bg-sand: #c49a52;
      --ink: #081116;
      --neon: #ff5533;
      --neon-2: #ffd166;
      --panel: rgba(6, 11, 22, 0.86);
      --panel-border: #2d4159;
      --text: #eff6ff;
      --hero: #1e89ff;
      --enemy: #f03f53;
      --accent: #7be0ff;
      --good: #5df56b;
      --warn: #ffc145;
      --danger: #ff4d4d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Rajdhani", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 8%, rgba(255, 209, 102, 0.24), transparent 20%),
        radial-gradient(circle at 90% 20%, rgba(255, 85, 51, 0.25), transparent 28%),
        linear-gradient(180deg, #12243d 0%, #1c3452 44%, #7a5d2f 44%, #9a783f 100%);
      display: grid;
      place-items: center;
      padding: 14px;
      overflow-x: hidden;
    }

    .home-link {
      position: fixed;
      top: 14px;
      left: 14px;
      text-decoration: none;
      color: #fff;
      border: 2px solid #ffffff;
      background: linear-gradient(180deg, #1e3148, #132235);
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 0.06em;
      z-index: 1000;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .home-link:hover,
    .home-link:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.12);
    }

    .game-wrap {
      width: min(1020px, 100%);
      position: relative;
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 20%),
        var(--panel);
      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.45),
        inset 0 0 0 2px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .character-select {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      align-content: center;
      gap: 16px;
      overflow-y: auto;
      padding: clamp(14px, 3vw, 24px);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 229, 156, 0.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255, 90, 90, 0.2), transparent 28%),
        rgba(4, 9, 17, 0.95);
    }

    .character-select.hidden {
      display: none;
    }

    .select-title {
      margin: 0;
      text-align: center;
      font-family: "Bangers", "Impact", sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      letter-spacing: 0.1em;
      color: #ffe8ab;
      text-shadow: 0 0 14px rgba(255, 223, 130, 0.6);
    }

    .select-subtitle {
      margin: 0;
      text-align: center;
      font-size: 1rem;
      opacity: 0.86;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .character-card {
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 12px;
      text-align: left;
      background: linear-gradient(180deg, rgba(44, 73, 106, 0.4), rgba(16, 28, 45, 0.55));
      color: #e9f3ff;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: center;
    }

    .card-sprite {
      width: 90px;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .card-sprite svg {
      width: 100%;
      height: 100%;
    }

    .card-sprite img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #flashSpriteImage,
    #glSpriteImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      transform: scale(1.65);
      transform-origin: center bottom;
    }

    .card-sprite img[src*="killercroc"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 40% center;
      transform: scale(1.08);
      transform-origin: center;
    }

    .card-sprite img[src*="theflash"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-sprite img[src*="thesinestro"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-sprite img[src*="thehawkgirl"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-sprite img[src*="thehaljordan"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-sprite img[src*="thedoomsday"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-text {
      display: grid;
      gap: 4px;
    }

    .character-card:hover,
    .character-card:focus-visible {
      transform: translateY(-2px);
      border-color: #ffe089;
      box-shadow: 0 0 0 2px rgba(255, 224, 137, 0.2);
    }

    .character-card.active {
      border-color: #ffe089;
      box-shadow: 0 0 0 3px rgba(255, 224, 137, 0.26);
      background: linear-gradient(180deg, rgba(56, 93, 133, 0.58), rgba(22, 38, 58, 0.8));
    }

    .card-title {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.06em;
      font-size: 1.26rem;
    }

    .card-tag {
      margin: 4px 0 8px;
      font-size: 0.94rem;
      color: #93d8ff;
      letter-spacing: 0.03em;
    }

    .card-stats {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.92;
      line-height: 1.35;
    }

    .select-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .select-start {
      border: 2px solid #ffffff;
      border-radius: 8px;
      font-size: 1rem;
      padding: 10px 14px;
      color: #fff;
      background: linear-gradient(180deg, #e1643f, #bb3c2a);
      font-weight: 700;
      cursor: pointer;
    }

    .select-hint {
      margin: 0;
      text-align: center;
      color: #ffd6bf;
      min-height: 20px;
    }

    .venue-select {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .venue-label {
      text-align: center;
      font-size: 0.95rem;
      color: #ffe8ab;
      font-weight: 600;
      margin: 0;
    }

    .venue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }

    .venue-option {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 12px 8px;
      background: linear-gradient(180deg, rgba(44, 73, 106, 0.3), rgba(16, 28, 45, 0.45));
      color: #c0d9ff;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .venue-option:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.6);
      background: linear-gradient(180deg, rgba(70, 100, 140, 0.4), rgba(30, 50, 80, 0.5));
    }

    .venue-option.active {
      border-color: #7be0ff;
      background: linear-gradient(180deg, rgba(123, 224, 255, 0.3), rgba(30, 140, 180, 0.4));
      color: #fff;
      box-shadow: 0 0 12px rgba(123, 224, 255, 0.4);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 2px solid var(--panel-border);
      background: linear-gradient(90deg, rgba(255, 77, 77, 0.15), rgba(123, 224, 255, 0.12));
    }

    .fighter-panel {
      display: grid;
      gap: 6px;
    }

    .fighter-name {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.08em;
      font-size: clamp(1rem, 2.8vw, 1.4rem);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
    }

    .health-bar {
      height: 18px;
      border: 2px solid #cde4ff;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.14);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #6dff7f, #4fd95f);
      transition: width 0.2s ease;
    }

    .timer-box {
      text-align: center;
      border: 2px solid #fff;
      border-radius: 12px;
      padding: 6px 14px;
      min-width: 112px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.28));
    }

    .timer-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      opacity: 0.8;
      margin: 0;
    }

    .timer {
      margin: 0;
      font-family: "Bangers", "Impact", sans-serif;
      font-size: clamp(1.5rem, 3.2vw, 2rem);
      color: var(--neon-2);
    }

    .arena {
      position: relative;
      height: min(60vh, 500px);
      min-height: 330px;
      overflow: hidden;
      isolation: isolate;
      border-bottom: 2px solid var(--panel-border);
      --fighter-floor: 28%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 34%),
        repeating-linear-gradient(90deg, rgba(255, 209, 102, 0.06) 0 16px, rgba(10, 14, 24, 0.04) 16px 32px),
        linear-gradient(180deg, #274c79 0 58%, #65461f 58% 100%);
    }

    /* Venue-specific arena styles */
    .arena.venue-rig {
      --fighter-floor: 6%;
      background: url("images/memorialstation.PNG") center center / 100% 100% no-repeat;
    }

    .arena.venue-rig .crowd,
    .arena.venue-rig .ground {
      display: none;
    }

    .arena.venue-street {
      --fighter-floor: 7%;
      background: url("images/fortressofsolitude.PNG?v=1") center center / 100% 100% no-repeat !important;
    }

    .arena.venue-street .crowd,
    .arena.venue-street .ground {
      display: none;
    }

    .arena.venue-stadium {
      --fighter-floor: 8%;
      background: url("images/slaughter swamp.PNG?v=1") center center / 100% 100% no-repeat !important;
    }

    .arena.venue-stadium .crowd {
      display: none;
    }

    .arena.venue-stadium .ground {
      display: none;
    }

    .arena.venue-underground {
      --fighter-floor: 9%;
      background: url("images/redsunprison.PNG?v=1") center center / 100% 100% no-repeat !important;
      border-bottom-color: transparent;
    }

    .arena.venue-underground .crowd {
      display: none;
    }

    .arena.venue-underground .ground {
      display: none;
    }

    .arena.venue-beach {
      background:
        linear-gradient(180deg, rgba(135, 206, 235, 0.4), rgba(70, 150, 200, 0.2) 40%, transparent 50%),
        repeating-linear-gradient(90deg, rgba(220, 200, 100, 0.1) 0 15px, rgba(210, 190, 80, 0.05) 15px 30px),
        linear-gradient(180deg, #d4af86 0 60%, #e8c5a0 60% 100%);
    }

    .stage-sign {
      display: none;
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.12em;
      color: #ffe8ab;
      font-size: clamp(1.1rem, 3vw, 1.9rem);
      text-shadow: 0 0 14px rgba(255, 237, 146, 0.75);
      z-index: 2;
    }

    .arena.venue-street .stage-sign {
      color: #ff6666;
      text-shadow: 0 0 14px rgba(255, 100, 100, 0.75);
    }

    .arena.venue-stadium .stage-sign {
      color: #ffff99;
      text-shadow: 0 0 20px rgba(255, 255, 150, 0.9);
    }

    .arena.venue-underground .stage-sign {
      color: #aaaacc;
      text-shadow: 0 0 10px rgba(150, 150, 200, 0.5);
    }

    .arena.venue-beach .stage-sign {
      color: #ffcc66;
      text-shadow: 0 0 14px rgba(255, 200, 100, 0.75);
    }

    .crowd {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 34%;
      height: 20%;
      background:
        radial-gradient(circle at 5% 60%, #1f2937 0 10%, transparent 11%),
        radial-gradient(circle at 12% 45%, #18212d 0 8%, transparent 9%),
        radial-gradient(circle at 20% 70%, #111a25 0 9%, transparent 10%),
        radial-gradient(circle at 30% 50%, #18212d 0 8%, transparent 9%),
        radial-gradient(circle at 40% 64%, #131c27 0 10%, transparent 11%),
        radial-gradient(circle at 52% 42%, #1b2736 0 8%, transparent 9%),
        radial-gradient(circle at 61% 68%, #121b26 0 9%, transparent 10%),
        radial-gradient(circle at 70% 46%, #1a2430 0 8%, transparent 9%),
        radial-gradient(circle at 80% 63%, #131c27 0 9%, transparent 10%),
        radial-gradient(circle at 90% 50%, #1b2736 0 8%, transparent 9%);
      opacity: 0.7;
      animation: crowdPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes crowdPulse {
      from { filter: brightness(0.9); }
      to { filter: brightness(1.08); }
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36%;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.07) 0 22px, transparent 22px 44px),
        linear-gradient(180deg, #816236, #5d3f1d);
    }

    .fighter {
      position: absolute;
      bottom: var(--fighter-floor);
      width: 200px;
      height: 280px;
      transition: filter 0.08s linear;
      --fighter-main: var(--hero);
      --fighter-limb: #203548;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .fighter.enemy {
      --fighter-main: var(--enemy);
      --fighter-limb: #511726;
    }

    .fighter.hit {
      filter: brightness(1.5) saturate(1.2);
    }

    /* Hide old geometric parts, show sprites */
    .fighter .shadow,
    .fighter .head,
    .fighter .body,
    .fighter .arm,
    .fighter .leg {
      display: none !important;
    }

    .fighter .sprite-frame {
      display: block;
      height: auto;
      width: auto;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      background: transparent !important;
      mix-blend-mode: normal;
    }

    .fighter .shadow {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -8px;
      height: 12px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 999px;
      filter: blur(1px);
      transform: scaleX(1);
    }

    .fighter .body {
      position: absolute;
      left: 18px;
      bottom: 24px;
      width: 36px;
      height: 62px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--fighter-main);
    }

    .fighter .head {
      position: absolute;
      left: 20px;
      bottom: 90px;
      width: 32px;
      height: 32px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #ffd6ae;
    }

    .fighter .arm,
    .fighter .leg {
      position: absolute;
      border: 2px solid var(--ink);
      background: var(--fighter-limb);
      border-radius: 6px;
      transform-origin: top center;
      transition: transform 0.06s ease;
    }

    .fighter .arm.left {
      left: 6px;
      bottom: 56px;
      width: 14px;
      height: 42px;
    }

    .fighter .arm.right {
      right: 6px;
      bottom: 56px;
      width: 14px;
      height: 42px;
    }

    .fighter .leg.left {
      left: 16px;
      bottom: 0;
      width: 14px;
      height: 42px;
    }

    .fighter .leg.right {
      right: 16px;
      bottom: 0;
      width: 14px;
      height: 42px;
    }

    .fighter.punching .arm.right,
    .fighter.enemy.punching .arm.left {
      transform: rotate(-95deg) translateY(-8px);
      height: 44px;
    }

    .fighter.kicking .leg.right,
    .fighter.enemy.kicking .leg.left {
      transform: rotate(-84deg) translateY(-10px);
      height: 46px;
    }

    .fighter.jumping {
      animation: hop 0.55s ease;
    }

    @keyframes hop {
      0% { transform: translateY(0); }
      50% { transform: translateY(-104px); }
      100% { transform: translateY(0); }
    }

    .impact {
      position: absolute;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 3px solid var(--neon-2);
      box-shadow: 0 0 20px rgba(255, 237, 146, 0.7);
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .impact.show {
      animation: impactFlash 0.22s ease;
    }

    .ground-burst {
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.42);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 235, 170, 0.85), rgba(255, 166, 76, 0.38) 46%, rgba(0, 0, 0, 0) 72%),
        conic-gradient(from 0deg, rgba(255, 220, 145, 0.7), rgba(255, 120, 72, 0.45), rgba(245, 235, 195, 0.65), rgba(255, 220, 145, 0.7));
      box-shadow:
        0 0 14px rgba(255, 184, 98, 0.42),
        0 0 24px rgba(255, 148, 84, 0.28);
      mix-blend-mode: screen;
    }

    .ground-burst.show {
      animation: groundBurst 0.42s cubic-bezier(0.15, 0.78, 0.24, 0.98) forwards;
    }

    .ground-debris {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 5px;
      border-radius: 3px;
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      background: linear-gradient(90deg, #ffe5b0, #ff8d5a);
      box-shadow: 0 0 7px rgba(255, 178, 102, 0.5);
      opacity: 0.92;
      animation: debrisFly 0.42s ease-out forwards;
    }

    @keyframes impactFlash {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.35);
      }
    }

    @keyframes groundBurst {
      0% {
        opacity: 0.9;
        transform: translate(-50%, -50%) scale(0.42);
      }
      75% {
        opacity: 0.44;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.4);
      }
    }

    @keyframes debrisFly {
      0% {
        opacity: 0.95;
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px))) rotate(calc(var(--rot, 0deg) + 72deg)) scale(0.55);
      }
    }

    .message {
      margin: 0;
      text-align: center;
      font-family: "Bangers", "Impact", sans-serif;
      letter-spacing: 0.08em;
      color: #ffe8ab;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      min-height: 38px;
      padding: 10px 12px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }

    .winner-dialogue {
      margin: 0;
      min-height: 28px;
      padding: 0 12px 10px;
      text-align: center;
      font-size: 0.98rem;
      color: #bcecff;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .winner-dialogue.show {
      opacity: 1;
      transform: translateY(0);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      padding: 12px 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(7, 14, 28, 0.7), rgba(7, 14, 28, 0.9));
    }

    .keys {
      margin: 0;
      display: grid;
      gap: 4px;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .keys strong {
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button {
      border: 2px solid #ffffff;
      color: #fff;
      border-radius: 8px;
      background: linear-gradient(180deg, #1d3a57, #122236);
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.14);
    }

    .mobile-controls {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      padding: 0 14px 16px;
    }

    .mobile-controls button {
      min-height: 42px;
      font-size: 0.88rem;
      border-radius: 10px;
      background: linear-gradient(180deg, #2c4a67, #17273a);
    }

    .mobile-controls button.punch {
      background: linear-gradient(180deg, #e1643f, #bb3c2a);
    }

    .mobile-controls button.kick {
      background: linear-gradient(180deg, #f6b84c, #ce8a1d);
    }

    .mobile-controls button.run {
      background: linear-gradient(180deg, #69d0ff, #2c86d9);
    }

    .mobile-controls button.run.active {
      border-color: #ffef99;
      box-shadow: 0 0 0 2px rgba(255, 239, 153, 0.22);
      filter: brightness(1.12);
    }

    .mobile-controls button.jump {
      background: linear-gradient(180deg, #4f9ef8, #2f6fd0);
    }

    @media (max-width: 900px) {
      .hud {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .timer-box {
        justify-self: center;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .action-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .character-grid {
        grid-template-columns: 1fr;
      }

      .arena {
        height: 54vh;
      }

      .keys {
        font-size: 0.88rem;
      }

      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>

  <main class="game-wrap" aria-label="Rig Arena fighting game">
    <section class="character-select" id="characterSelect" aria-label="Character selection">
      <h1 class="select-title">Choose Your Fighter</h1>
      <p class="select-subtitle">Pick a style before entering Rig Arena.</p>
      <div class="character-grid">

        <button class="character-card" type="button" data-character="green-lantern">
          <div class="card-sprite">

          <div class="card-text">
            <p class="card-title">Green Lantern</p>
            <p class="card-tag">Power Ring</p>

          </div>
        </button>
        <button class="character-card" type="button" data-character="hawkgirl">
          <div class="card-sprite">

          <div class="card-text">

        </button>
        <button class="character-card" type="button" data-character="killercroc">
          <div class="card-sprite">

          <div class="card-text">
            <p class="card-title">Killer Croc</p>
            <p class="card-tag">Sewer Brute</p>
            <p class="card-stats">Punch: Ultra | Kick: Ultra | Speed: Low</p>
          </div>
        </button>
        <button class="character-card" type="button" data-character="doomsday">
          <div class="card-sprite">
            <img src="images/thedoomsday.PNG" alt="Doomsday" />

          <div class="card-text">
            <p class="card-title">Doomsday</p>

    <section class="hud">

          <div class="health-fill" id="enemyHealth"></div>
        </div>

    <section class="arena" id="arena" aria-label="Fight arena">
      <div class="stage-sign" id="stageSign">MEMORIAL STATION</div>

      <div class="fighter" id="player" style="left: 100px;">
        <div class="shadow"></div>

        <div class="shadow"></div>
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="leg left"></div>
        <div class="leg right"></div>

    <p class="message" id="message" aria-live="polite">Fight! Use movement and combo attacks.</p>

        <strong>Desktop Controls:</strong>
        A/D move, S run (Killer Croc: sequence-02), W jump, F punch, G kick

        <button id="resetBtn" type="button">Reset Round</button>

      <button class="jump" data-action="jump" type="button">Jump</button>
      <button class="punch" data-action="punch" type="button">Punch</button>
      <button class="kick" data-action="kick" type="button">Kick</button>
    </section>
  </main>

  <script>
    const arena = document.getElementById("arena");
    const playerEl = document.getElementById("player");
    const enemyEl = document.getElementById("enemy");
    const timerEl = document.getElementById("timer");
    const timerLabelEl = document.querySelector(".timer-label");
    const playerHealthEl = document.getElementById("playerHealth");
    const enemyHealthEl = document.getElementById("enemyHealth");
    const playerNameEl = document.getElementById("playerName");
    const enemyNameEl = document.getElementById("enemyName");
    const messageEl = document.getElementById("message");
    const winnerDialogueEl = document.getElementById("winnerDialogue");
    const impactEl = document.getElementById("impact");
    const resetBtn = document.getElementById("resetBtn");
    const stageSignEl = document.getElementById("stageSign");
    const mobileButtons = Array.from(document.querySelectorAll(".mobile-controls button"));
    const characterSelectEl = document.getElementById("characterSelect");
    const selectHintEl = document.getElementById("selectHint");
    const startFightBtn = document.getElementById("startFightBtn");
    const characterCards = Array.from(document.querySelectorAll(".character-card"));
    const urlParams = new URLSearchParams(window.location.search);

    const characterRoster = [
      {
        id: "flash",
        name: "Flash",
        bodyColor: "#cc0000",
        limbColor: "#990000",
        punchBonus: -1,
        kickBonus: -1,
        moveBonus: 8
      },
      {
        id: "green-lantern",
        name: "Green Lantern",
        bodyColor: "#00a86b",
        limbColor: "#004d2d",
        punchBonus: 3,
        kickBonus: 4,
        moveBonus: 1
      },
      {
        id: "hawkgirl",
        name: "Hawkgirl",
        bodyColor: "#c69a42",
        limbColor: "#7a5b21",
        punchBonus: 2,
        kickBonus: 3,
        moveBonus: 4
      },
      {
        id: "killercroc",
        name: "Killer Croc",
        bodyColor: "#3f6b42",
        limbColor: "#2c4b2f",
        punchBonus: 5,
        kickBonus: 5,
        moveBonus: -2
      },
      {
        id: "doomsday",
        name: "Doomsday",
        bodyColor: "#7f7f7f",
        limbColor: "#4c4c4c",
        punchBonus: 6,
        kickBonus: 6,
        moveBonus: -3
      }
    ];

    const state = {
      arenaWidth: 920,
      playerX: 100,
      enemyX: 640,
      baseMoveStep: 26,
      moveStep: 26,
      runMultiplier: 1.5,
      jumpLock: false,
      playerHealth: 100,
      enemyHealth: 100,
      selectedCharacterId: "",
      forcedCharacterId: "",
      forcedEnemyCharacterId: "",
      selectedCharacter: null,
      enemyCharacter: null,
      selectedVenue: "rig",
      playerPunchBonus: 0,
      playerKickBonus: 0,
      enemyPunchBonus: 0,
      enemyKickBonus: 0,
      canAttack: true,
      enemyCanAttack: true,
      currentRound: 1,
      maxRounds: 5,
      playerRoundsWon: 0,
      enemyRoundsWon: 0,
      roundActive: false,
      matchOver: false,
      selectionLocked: false,
      movingLeft: false,
      movingRight: false,
      isRunning: false,
      enemyBrain: null,
      nextRoundTimeout: null
    };

    const attackConfig = {
      punch: { damage: 4, range: 105, cooldown: 360, className: "punching" },
      kick: { damage: 6, range: 120, cooldown: 560, className: "kicking" }
    };

    const winnerDialoguesByCharacter = {
      flash: [
        "Too slow. You never had a chance.",
        "I hit first and finished faster.",
        "You blinked. Round over."
      ],
      "green-lantern": [
        "The ring chose this victory.",
        "Willpower wins every time.",
        "Another round secured by the Corps."
      ],
      hawkgirl: [
        "Sky or ground, I own this fight.",
        "You were never out of my sight.",
        "That is how a warrior ends a round."
      ],
      killercroc: [
        "I warned you not to get close.",
        "You step in my swamp, you sink.",
        "That round belonged to me."
      ],
      doomsday: [
        "Break. Crush. Repeat.",
        "You cannot stop what I am.",
        "Only ruin follows me."
      ]
    };

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function roundsToWin() {
      return Math.ceil(state.maxRounds / 2);
    }

    function updateRoundDisplay() {
      timerEl.textContent = `${state.currentRound}/${state.maxRounds}`;
      if (timerLabelEl) {
        timerLabelEl.textContent = `ROUND (${state.playerRoundsWon}-${state.enemyRoundsWon})`;
      }
    }

    function getCharacterById(id) {
      return characterRoster.find((character) => character.id === id) || null;
    }

    function chooseEnemyCharacter(playerCharacterId) {
      if (state.forcedEnemyCharacterId) {
        const forcedEnemy = getCharacterById(state.forcedEnemyCharacterId);
        if (forcedEnemy) {
          return forcedEnemy;
        }
      }

      const options = characterRoster.filter((character) => character.id !== playerCharacterId);
      return options[Math.floor(Math.random() * options.length)] || characterRoster[0];
    }

    function applyFighterStyle(element, character) {
      element.style.setProperty("--fighter-main", character.bodyColor);
      element.style.setProperty("--fighter-limb", character.limbColor);
    }

    function highlightSelectedCard() {
      characterCards.forEach((card) => {
        const isActive = card.getAttribute("data-character") === state.selectedCharacterId;
        card.classList.toggle("active", isActive);
      });
    }

    function configureSelectedFighters() {
      const selected = getCharacterById(state.selectedCharacterId);
      if (!selected) {
        return false;
      }

      const enemy = chooseEnemyCharacter(selected.id);
      state.selectedCharacter = selected;
      state.enemyCharacter = enemy;

      state.playerPunchBonus = selected.punchBonus;
      state.playerKickBonus = selected.kickBonus;
      state.enemyPunchBonus = enemy.punchBonus;
      state.enemyKickBonus = enemy.kickBonus;
      state.baseMoveStep = clamp(26 + selected.moveBonus, 20, 34);
      updatePlayerMoveSpeed();

      playerNameEl.textContent = selected.name.toUpperCase();
      enemyNameEl.textContent = enemy.name.toUpperCase();

      applyFighterStyle(playerEl, selected);
      applyFighterStyle(enemyEl, enemy);
      return true;
    }

    function beginFight() {
      if (!state.selectedCharacterId && state.forcedCharacterId) {
        state.selectedCharacterId = state.forcedCharacterId;
      }

      if (!state.selectedCharacterId) {
        selectHintEl.textContent = "Pick a fighter before starting the round.";
        return;
      }

      if (!configureSelectedFighters()) {
        selectHintEl.textContent = "Unable to load fighter. Try selecting again.";
        return;
      }

      state.selectionLocked = true;
      state.movingLeft = false;
      state.movingRight = false;
      state.isRunning = false;
      state.currentRound = 1;
      state.playerRoundsWon = 0;
      state.enemyRoundsWon = 0;
      state.matchOver = false;
      characterSelectEl.classList.add("hidden");
      
      // Initialize sprite rendering for this fight
      initializeSpritesForFight();
      
      setMessage("Fight! Use movement and combo attacks.");
      setWinnerDialogue("");
      resetRound();
    }

    function updateRunButtonState() {
      mobileButtons.forEach((button) => {
        if (button.getAttribute("data-action") === "run") {
          button.classList.toggle("active", state.isRunning);
          button.textContent = state.isRunning ? "Run On" : "Run Off";
        }
      });
    }

    function updatePlayerMoveSpeed() {
      const multiplier = state.isRunning ? state.runMultiplier : 1;
      state.moveStep = clamp(Math.round(state.baseMoveStep * multiplier), 20, 52);
    }

    function initializeSpritesForFight() {
      // Clear old fighter HTML and prepare for sprites
      playerEl.innerHTML = '';
      enemyEl.innerHTML = '';
      
      // Get the actual character IDs
      const playerCharId = state.selectedCharacter.id;
      const enemyCharId = state.enemyCharacter.id;
      
      // Set idle pose for both fighters (standing still, first frame)
      if (spriteAnimators[playerCharId]) {
        spriteAnimators[playerCharId].playIdle();
      }
      if (spriteAnimators[enemyCharId]) {
        spriteAnimators[enemyCharId].playIdle();
      }
    }

    function updateArenaMetrics() {
      state.arenaWidth = arena.clientWidth;
      const maxX = state.arenaWidth - 78;
      state.playerX = clamp(state.playerX, 0, maxX);
      state.enemyX = clamp(state.enemyX, 0, maxX);
      renderPositions();
    }

    function renderPositions() {
      playerEl.style.left = state.playerX + "px";
      enemyEl.style.left = state.enemyX + "px";
    }

    function updateHealthBars() {
      playerHealthEl.style.width = state.playerHealth + "%";
      enemyHealthEl.style.width = state.enemyHealth + "%";

      playerHealthEl.style.background = healthGradient(state.playerHealth);
      enemyHealthEl.style.background = healthGradient(state.enemyHealth);
    }

    function healthGradient(value) {
      if (value <= 25) {
        return "linear-gradient(90deg, #ff4d4d, #c22828)";
      }
      if (value <= 55) {
        return "linear-gradient(90deg, #ffc145, #e49012)";
      }
      return "linear-gradient(90deg, #6dff7f, #4fd95f)";
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function setWinnerDialogue(text) {
      if (!winnerDialogueEl) {
        return;
      }

      winnerDialogueEl.textContent = text || "";
      winnerDialogueEl.classList.toggle("show", Boolean(text));
    }

    function getWinnerDialogue(character) {
      if (!character || !character.id) {
        return "";
      }

      const lines = winnerDialoguesByCharacter[character.id] || ["Round won."];
      return lines[Math.floor(Math.random() * lines.length)];
    }

    function showImpact(targetX) {
      const arenaRect = arena.getBoundingClientRect();
      const hitX = clamp(targetX, 16, state.arenaWidth - 16);
      impactEl.style.left = hitX + "px";
      impactEl.style.top = Math.round(arenaRect.height * 0.58) + "px";
      impactEl.classList.remove("show");
      void impactEl.offsetWidth;
      impactEl.classList.add("show");
    }

    function showGroundBurst(sourceX, intensity = 1) {
      const arenaRect = arena.getBoundingClientRect();
      const burst = document.createElement("div");
      burst.className = "ground-burst";

      const burstX = clamp(sourceX, 20, state.arenaWidth - 20);
      burst.style.left = burstX + "px";
      burst.style.top = Math.round(arenaRect.height * 0.75) + "px";

      const scale = clamp(intensity, 0.7, 1.35);
      burst.style.width = Math.round(88 * scale) + "px";
      burst.style.height = Math.round(88 * scale) + "px";

      const debrisCount = Math.round(8 + (scale * 4));
      for (let i = 0; i < debrisCount; i += 1) {
        const debris = document.createElement("span");
        debris.className = "ground-debris";
        const angle = (-75 + Math.random() * 150) * (Math.PI / 180);
        const distance = 26 + Math.random() * 36 * scale;
        const dx = Math.cos(angle) * distance;
        const dy = -(Math.abs(Math.sin(angle)) * (14 + Math.random() * 22 * scale));
        debris.style.setProperty("--dx", `${dx.toFixed(1)}px`);
        debris.style.setProperty("--dy", `${dy.toFixed(1)}px`);
        debris.style.setProperty("--rot", `${Math.round(Math.random() * 150 - 75)}deg`);
        burst.appendChild(debris);
      }

      arena.appendChild(burst);
      requestAnimationFrame(() => burst.classList.add("show"));
      burst.addEventListener("animationend", () => burst.remove(), { once: true });
    }

    function getFighterGroundContactX(fighterEl) {
      const arenaRect = arena.getBoundingClientRect();
      const fighterRect = fighterEl.getBoundingClientRect();
      const localCenterX = (fighterRect.left - arenaRect.left) + (fighterRect.width / 2);
      return clamp(localCenterX, 20, state.arenaWidth - 20);
    }

    function triggerDoomsdayGroundExplosion(characterId, actionType, fighterEl) {
      // Doomsday sequence-03 maps to kick; trigger a two-phase burst on impact.
      if (characterId !== "doomsday" || actionType !== "kick") {
        return;
      }

      setTimeout(() => {
        if (!state.roundActive) {
          return;
        }
        const baseX = getFighterGroundContactX(fighterEl);
        showGroundBurst(baseX, 1.12);
        setTimeout(() => {
          showGroundBurst(baseX + (Math.random() * 22 - 11), 0.92);
        }, 95);
      }, 170);
    }

    function setHitFlash(element) {
      element.classList.add("hit");
      setTimeout(() => element.classList.remove("hit"), 120);
    }

    function performPlayerJump() {
      if (!state.roundActive || state.jumpLock) {
        return;
      }
      state.jumpLock = true;
      playerEl.classList.add("jumping");
      setTimeout(() => {
        playerEl.classList.remove("jumping");
        state.jumpLock = false;
      }, 560);
    }

    function movePlayer(direction) {
      if (!state.roundActive) {
        return;
      }
      const maxX = state.arenaWidth - 78;
      state.playerX = clamp(state.playerX + direction * state.moveStep, 0, maxX);
      renderPositions();
    }

    function isPlayerInRange(range) {
      return Math.abs((state.playerX + 36) - (state.enemyX + 36)) <= range;
    }

    function runAttackAnimation(element, className, duration) {
      element.classList.add(className);
      setTimeout(() => element.classList.remove(className), duration);
    }

    function getAttackReturnDelay(animator, actionType) {
      if (!animator) {
        return 500;
      }

      const sequenceName = animationMap[actionType] || "sequence-01";
      const sequence = animator.sequences && animator.sequences[sequenceName];
      const frameCount = sequence && sequence.frames ? sequence.frames.length : 1;
      const frameDelay = animator.defaultFrameDelay || animator.frameDelay || 80;
      return Math.max(380, frameCount * frameDelay + 120);
    }

    function getPlayerActionSequenceName(actionType) {
      if (state.selectedCharacter && state.selectedCharacter.id === "killercroc" && actionType === "punch") {
        return "sequence-03";
      }
      return animationMap[actionType] || "sequence-01";
    }

    function playerAttack(type) {
      if (!state.roundActive || !state.canAttack) {
        return;
      }

      const attack = attackConfig[type];
      if (!attack) {
        return;
      }

      const damageBonus = type === "kick" ? state.playerKickBonus : state.playerPunchBonus;
      const damage = clamp(attack.damage + damageBonus, 2, 12);

      state.canAttack = false;
      runAttackAnimation(playerEl, attack.className, attack.cooldown - 80);

      // Play player sprite attack animation even if the strike misses.
      if (state.selectedCharacter && spriteAnimators[state.selectedCharacter.id]) {
        const anim = spriteAnimators[state.selectedCharacter.id];
        const sequenceName = getPlayerActionSequenceName(type);
        anim.playSequence(sequenceName, false);
        setTimeout(() => anim.playIdle(), getAttackReturnDelay(anim, type));
      }

      if (state.selectedCharacter) {
        triggerDoomsdayGroundExplosion(state.selectedCharacter.id, type, playerEl);
      }

      if (isPlayerInRange(attack.range)) {
        state.enemyHealth = clamp(state.enemyHealth - damage, 0, 100);
        updateHealthBars();
        setHitFlash(enemyEl);
        showImpact(state.enemyX + 36);
        setMessage(type === "kick" ? "Heavy kick lands!" : "Clean punch!");
        evaluateRoundEnd();
      } else {
        setMessage("Attack missed. Close the distance.");
      }

      setTimeout(() => {
        state.canAttack = true;
      }, attack.cooldown);
    }

    function enemyAttack(type) {
      if (!state.roundActive || !state.enemyCanAttack) {
        return;
      }

      const attack = attackConfig[type];
      const damageBonus = type === "kick" ? state.enemyKickBonus : state.enemyPunchBonus;
      const damage = clamp(attack.damage + damageBonus, 2, 12);
      state.enemyCanAttack = false;
      runAttackAnimation(enemyEl, attack.className, attack.cooldown - 90);

      if (state.enemyCharacter) {
        triggerDoomsdayGroundExplosion(state.enemyCharacter.id, type, enemyEl);
      }

      if (Math.abs((state.enemyX + 36) - (state.playerX + 36)) <= attack.range) {
              // Play enemy sprite attack animation
              if (state.enemyCharacter && spriteAnimators[state.enemyCharacter.id]) {
                const anim = spriteAnimators[state.enemyCharacter.id];
                const sequenceName = animationMap[type] || 'sequence-01';
                anim.playSequence(sequenceName, false);
                setTimeout(() => anim.playIdle(), getAttackReturnDelay(anim, type));
              }

        state.playerHealth = clamp(state.playerHealth - damage, 0, 100);
        updateHealthBars();
        setHitFlash(playerEl);
        showImpact(state.playerX + 36);
        setMessage(type === "kick" ? "Opponent lands a kick!" : "Opponent punches!");
        evaluateRoundEnd();
      }

      setTimeout(() => {
        state.enemyCanAttack = true;
      }, attack.cooldown + 120);
    }

    function enemyAI() {
      if (!state.roundActive) {
        return;
      }

      const maxX = state.arenaWidth - 78;
      const distance = (state.playerX + 36) - (state.enemyX + 36);
      const absDistance = Math.abs(distance);

      if (absDistance > 96) {
        const step = absDistance > 220 ? 24 : 16;
        state.enemyX = clamp(state.enemyX + Math.sign(distance) * step, 0, maxX);
        renderPositions();
      } else if (state.enemyCanAttack) {
        const move = Math.random();
        if (move < 0.55) {
          enemyAttack("punch");
        } else {
          enemyAttack("kick");
        }
      }
    }

    function evaluateRoundEnd() {
      if (state.playerHealth <= 0 || state.enemyHealth <= 0) {
        finishRound();
      }
    }

    function finishRound() {
      if (!state.roundActive) {
        return;
      }

      state.roundActive = false;
      clearInterval(state.enemyBrain);
      if (state.nextRoundTimeout) {
        clearTimeout(state.nextRoundTimeout);
        state.nextRoundTimeout = null;
      }

      let roundResult = "Round drawn.";
      let roundWinnerCharacter = null;
      let roundWinnerName = "";
      if (state.playerHealth > state.enemyHealth) {
        state.playerRoundsWon += 1;
        roundResult = "You win the round!";
        roundWinnerCharacter = state.selectedCharacter;
        roundWinnerName = state.selectedCharacter ? state.selectedCharacter.name : "You";
      } else if (state.enemyHealth > state.playerHealth) {
        state.enemyRoundsWon += 1;
        roundResult = "Opponent wins the round.";
        roundWinnerCharacter = state.enemyCharacter;
        roundWinnerName = state.enemyCharacter ? state.enemyCharacter.name : "Opponent";
      }

      if (roundWinnerCharacter) {
        const line = getWinnerDialogue(roundWinnerCharacter);
        setWinnerDialogue(`${roundWinnerName}: "${line}"`);
      } else {
        setWinnerDialogue("");
      }

      const reachedTargetWins = state.playerRoundsWon >= roundsToWin() || state.enemyRoundsWon >= roundsToWin();
      const reachedRoundLimit = state.currentRound >= state.maxRounds;

      if (reachedTargetWins || reachedRoundLimit) {
        state.matchOver = true;
        if (state.playerRoundsWon > state.enemyRoundsWon) {
          setMessage(`${roundResult} Match won ${state.playerRoundsWon}-${state.enemyRoundsWon}.`);
        } else if (state.enemyRoundsWon > state.playerRoundsWon) {
          setMessage(`${roundResult} Match lost ${state.playerRoundsWon}-${state.enemyRoundsWon}.`);
        } else {
          setMessage(`Match draw ${state.playerRoundsWon}-${state.enemyRoundsWon}.`);
        }
        return;
      }

      state.currentRound += 1;
      updateRoundDisplay();
      setMessage(`${roundResult} Next round starting... (${state.playerRoundsWon}-${state.enemyRoundsWon})`);
      state.nextRoundTimeout = setTimeout(() => {
        resetRound();
      }, 1100);
    }

    function processSpriteTransparency(imageId) {
      const spriteImage = document.getElementById(imageId);
      if (!spriteImage) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = sourceImage.naturalWidth;
        canvas.height = sourceImage.naturalHeight;
        const context = canvas.getContext("2d");

        if (!context) {
          return;
        }

        context.drawImage(sourceImage, 0, 0);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = frame.data;

        for (let i = 0; i < pixels.length; i += 4) {
          const r = pixels[i];
          const g = pixels[i + 1];
          const b = pixels[i + 2];
          const a = pixels[i + 3];
          const min = Math.min(r, g, b);
          const max = Math.max(r, g, b);
          const lowColorSpread = max - min <= 16;

          if (min >= 246) {
            pixels[i + 3] = 0;
          } else if (min >= 224 && lowColorSpread) {
            const fadeRatio = (246 - min) / 22;
            pixels[i + 3] = Math.max(0, Math.min(255, Math.round(a * fadeRatio)));
          }
        }

        context.putImageData(frame, 0, 0);

        // Trim transparent borders so the sprite fills the card instead of staying tiny.
        let minX = canvas.width;
        let minY = canvas.height;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < canvas.height; y += 1) {
          for (let x = 0; x < canvas.width; x += 1) {
            const alpha = pixels[(y * canvas.width + x) * 4 + 3];
            if (alpha > 8) {
              if (x < minX) minX = x;
              if (y < minY) minY = y;
              if (x > maxX) maxX = x;
              if (y > maxY) maxY = y;
            }
          }
        }

        if (maxX > minX && maxY > minY) {
          const pad = 6;
          const cropX = Math.max(0, minX - pad);
          const cropY = Math.max(0, minY - pad);
          const cropW = Math.min(canvas.width - cropX, (maxX - minX + 1) + pad * 2);
          const cropH = Math.min(canvas.height - cropY, (maxY - minY + 1) + pad * 2);

          const croppedCanvas = document.createElement("canvas");
          croppedCanvas.width = cropW;
          croppedCanvas.height = cropH;
          const croppedContext = croppedCanvas.getContext("2d");

          if (croppedContext) {
            croppedContext.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            spriteImage.src = croppedCanvas.toDataURL("image/png");
            return;
          }
        }

        spriteImage.src = canvas.toDataURL("image/png");
      };

      sourceImage.src = spriteImage.src;
    }

    function cleanupGreenLanternCard(imageId) {
      const spriteImage = document.getElementById(imageId);
      if (!spriteImage) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = sourceImage.naturalWidth;
        canvas.height = sourceImage.naturalHeight;
        const context = canvas.getContext("2d");

        if (!context) {
          return;
        }

        context.drawImage(sourceImage, 0, 0);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = frame.data;
        const width = canvas.width;
        const height = canvas.height;

        const rowOpaque = new Array(height).fill(0);
        const rowGuideLike = new Array(height).fill(0);
        const colOpaque = new Array(width).fill(0);
        const colGuideLike = new Array(width).fill(0);

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const i = (y * width + x) * 4;
            const r = pixels[i];
            const g = pixels[i + 1];
            const b = pixels[i + 2];
            const a = pixels[i + 3];

            if (a <= 20) {
              continue;
            }

            rowOpaque[y] += 1;
            colOpaque[x] += 1;

            const darkGuidePixel = r < 68 && g < 88 && b < 102;
            const brightGuidePixel = r > 205 && g > 205 && b > 205;
            if (darkGuidePixel || brightGuidePixel) {
              rowGuideLike[y] += 1;
              colGuideLike[x] += 1;
            }
          }
        }

        const guideRows = new Array(height).fill(false);
        const guideCols = new Array(width).fill(false);

        for (let y = 0; y < height; y += 1) {
          if (rowOpaque[y] >= 8 && rowGuideLike[y] / rowOpaque[y] >= 0.62) {
            guideRows[y] = true;
          }
        }

        for (let x = 0; x < width; x += 1) {
          if (colOpaque[x] >= 8 && colGuideLike[x] / colOpaque[x] >= 0.62) {
            guideCols[x] = true;
          }
        }

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            if (!guideRows[y] && !guideCols[x]) {
              continue;
            }

            const i = (y * width + x) * 4;
            const r = pixels[i];
            const g = pixels[i + 1];
            const b = pixels[i + 2];
            const a = pixels[i + 3];

            if (a <= 20) {
              continue;
            }

            const darkGuidePixel = r < 80 && g < 96 && b < 112;
            const brightGuidePixel = r > 200 && g > 200 && b > 200;
            if (darkGuidePixel || brightGuidePixel) {
              pixels[i + 3] = 0;
            }
          }
        }

        context.putImageData(frame, 0, 0);
        spriteImage.src = canvas.toDataURL("image/png");
      };

      sourceImage.src = spriteImage.src;
    }

    function triggerKillerCrocSequenceTwo() {
      if (!state.roundActive || !state.selectedCharacter || state.selectedCharacter.id !== "killercroc") {
        return;

      const animator = spriteAnimators[state.selectedCharacter.id];
      if (!animator || !animator.sequences || !animator.sequences["sequence-02"]) {

      // Make S-driven sequence-02 advance Croc toward the opponent.

      if (directionToEnemy === 0) {

        renderPositions();

      animator.playSequence("sequence-02", false);
      const sequence = animator.sequences["sequence-02"];
      const frameCount = sequence && sequence.frames ? sequence.frames.length : 1;
      const frameDelay = animator.defaultFrameDelay || animator.frameDelay || 80;
      const duration = Math.max(320, frameCount * frameDelay + 120);
      setTimeout(() => {
        if (!state.roundActive || !state.selectedCharacter || state.selectedCharacter.id !== "killercroc") {

    // ====== SPRITE RENDERING SYSTEM ======

    function calculateCharacterSpriteScale(sequences) {
      const heights = [];

      Object.values(sequences || {}).forEach((seq) => {
        (seq.frames || []).forEach((frame) => {
          const box = frame && frame.bbox ? frame.bbox : null;
          const h = box && typeof box.height === "number" ? box.height : 0;
          if (h >= 60) {
            heights.push(h);
          }
        });
      });

      if (heights.length === 0) {
        return 1;
      }

      heights.sort((a, b) => a - b);
      const medianHeight = heights[Math.floor(heights.length / 2)] || heights[0];
      const targetVisualHeight = 185;
      return clamp(targetVisualHeight / medianHeight, 0.72, 1.35);
    }

    function sanitizeFlashSequences(sequences) {
      const flashIdleFrame = {
        frame: "idle-placeholder",
        file: "flash-placeholder.png",
        path: "images/flash-placeholder.png"
      };

      sequences["sequence-idle"] = {

    function sanitizeGreenLanternSequences(sequences) {
      const runSeq = sequences["sequence-01"];
      if (!runSeq || !runSeq.frames || runSeq.frames.length === 0) {
        return sequences;
      }

      // Keep plausible full-body movement frames from the fresh sprite extraction.
      const stableWalkFrames = runSeq.frames.filter((frame) => {
        const box = frame.bbox || {};
        return (box.width || 0) >= 60 && (box.height || 0) >= 135;
      });

      const walkFrames = stableWalkFrames.length > 0 ? stableWalkFrames : [runSeq.frames[0]];
      const hoverFrame = walkFrames.reduce((best, frame) => {
        const bestArea = (best && best.area) || 0;
        const frameArea = frame && frame.area ? frame.area : 0;
        return frameArea > bestArea ? frame : best;
      }, walkFrames[0]);
      const seq2Frames = (sequences["sequence-02"] && sequences["sequence-02"].frames) || [];
      const constructFrames = seq2Frames.filter((frame) => {
        const box = frame.bbox || {};
        return (box.width || 0) >= 65 && (box.height || 0) >= 130;
      });

      const seq3Frames = (sequences["sequence-03"] && sequences["sequence-03"].frames) || [];
      const kickFrames = seq3Frames.filter((frame) => {
        const box = frame.bbox || {};
        return (box.width || 0) >= 60 && (box.height || 0) >= 118;
      });

      sequences["sequence-01"] = {
        name: "sequence-01",
        frames: [{ ...hoverFrame }]
      };

      sequences["sequence-idle"] = {
        name: "sequence-idle",
        frames: [{ ...hoverFrame }, { ...hoverFrame }]
      };

      // Use the actual ring-construct attack sequence from the sprite sheet.
      sequences["sequence-02"] = {
        name: "sequence-02",
        frames: constructFrames.length >= 3
          ? constructFrames.map((frame) => ({ ...frame }))
          : [{ ...hoverFrame }]
      };

      sequences["sequence-03"] = {
        name: "sequence-03",
        frames: kickFrames.length >= 3
          ? kickFrames.map((frame) => ({ ...frame }))
          : [
              { ...walkFrames[0] },
              { ...(walkFrames[1] || walkFrames[0]) },
              { ...(walkFrames[2] || walkFrames[0]) },
              { ...hoverFrame }
            ]
      };

      return sequences;
    }

    function sanitizeKillerCrocSequences(sequences) {
      const punchSeq = sequences["sequence-03"];
      if (!punchSeq || !punchSeq.frames || punchSeq.frames.length === 0) {
        return sequences;
      }

      // Keep only full-body punch frames (drop cropped torso-only frames).
      const fullBodyFrames = punchSeq.frames.filter((frame) => {
        const box = frame.bbox || {};
        return (box.width || 0) >= 95 && (box.height || 0) >= 135;
      });

      if (fullBodyFrames.length > 0) {
        sequences["sequence-03"] = {
          name: "sequence-03",
          frames: fullBodyFrames.map((frame) => ({ ...frame }))
        };
      }

      const specialSeq = sequences["sequence-04"];
      if (specialSeq && specialSeq.frames && specialSeq.frames.length > 0) {
        // Drop cropped lower-body frames that hide the head in sequence-04.
        const visibleHeadFrames = specialSeq.frames.filter((frame) => {
          const box = frame.bbox || {};
          return (box.height || 0) >= 150;
        });

        if (visibleHeadFrames.length > 0) {
          sequences["sequence-04"] = {
            name: "sequence-04",
            frames: visibleHeadFrames.map((frame) => ({ ...frame }))
          };
        }
      }

      const walkSeq = sequences["sequence-01"];
      if (walkSeq && walkSeq.frames && walkSeq.frames.length > 1) {
        const cleanWalkFrames = walkSeq.frames.filter((frame) => {
          const frameRef = frame.path || frame.framePath || frame.file || "";
          return !/frame-01\.png$/i.test(frameRef);
        });
        if (cleanWalkFrames.length > 0) {
          sequences["sequence-01"] = {
            name: "sequence-01",
            frames: cleanWalkFrames.map((frame) => ({ ...frame }))
          };
        }

        // Keep Killer Croc perfectly still at idle; legs should only move while walking.
        const idleBase = sequences["sequence-01"].frames;
        const standFrame = idleBase[0];
        sequences["sequence-idle"] = {
          name: "sequence-idle",
          frames: [{ ...standFrame }, { ...standFrame }]
        };
      }

      return sequences;
    }

    function sanitizeDoomsdaySequences(sequences) {
      const moveSeq = sequences["sequence-01"];
      if (!moveSeq || !moveSeq.frames || moveSeq.frames.length === 0) {
        return sequences;
      }

      const moveFrames = moveSeq.frames.filter((frame) => {
        const frameRef = frame.path || frame.framePath || frame.file || "";
        if (/frame-(09|10)\.png$/i.test(frameRef)) {
          return false;
        }
        const box = frame.bbox || {};
        return (box.width || 0) >= 95 && (box.height || 0) >= 150;
      });

      const selectedMoveFrames = moveFrames.length >= 4 ? moveFrames : moveSeq.frames;
      sequences["sequence-01"] = {
        name: "sequence-01",
        frames: selectedMoveFrames.map((frame) => ({ ...frame }))
      };

          });

          components.forEach((comp) => {
            if (keep.has(comp)) {
              return;
            }
            comp.points.forEach(([px, py]) => {
              const i = (py * width + px) * 4;
              pixels[i + 3] = 0;
            });
          });
        }

        context.putImageData(frame, 0, 0);
        cleanedFrameSrcCache.set(framePath, canvas.toDataURL("image/png"));
        frameCleanupInProgress.delete(framePath);
      };

      sourceImage.onerror = () => {
        frameCleanupInProgress.delete(framePath);
      };

      sourceImage.src = framePath;
    }

    function resolveFrameSrc(characterId, framePath) {
      if (characterId !== "green-lantern" && characterId !== "killercroc" && characterId !== "sinestro") {
        return framePath;
      }

      if (cleanedFrameSrcCache.has(framePath)) {
        return cleanedFrameSrcCache.get(framePath);
      }

      if (characterId === "green-lantern") {
        requestGreenLanternFrameCleanup(framePath);
      } else if (characterId === "killercroc") {
        requestKillerCrocFrameCleanup(framePath);
      } else if (characterId === "sinestro") {
        requestSinestroFrameCleanup(framePath);
      }
      return framePath;
    }

    // Sprite animation manager
    class SpriteAnimator {
      constructor(characterId, sequences) {
        this.characterId = characterId;
        this.sequences = sequences;
        this.currentSequence = null;
        this.currentFrame = 0;
        this.frameTime = 0;
        this.defaultFrameDelay = 80;
        this.idleFrameDelay = 220;
        this.frameDelay = this.defaultFrameDelay; // ms per frame
        this.isPlaying = false;
        this.loop = true;
        this.isIdle = false;
        this.pingPong = false;
        this.frameDirection = 1;
      }

      playSequence(sequenceName, loop = true, pingPong = false) {
        if (this.currentSequence === sequenceName && this.isPlaying && this.pingPong === pingPong) {
          return;
        }
        const seq = this.sequences[sequenceName];
        if (!seq) {
          console.warn(`Sequence ${sequenceName} not found for ${this.characterId}`);
          return;
        }
        this.currentSequence = sequenceName;
        this.currentFrame = 0;
        this.frameTime = 0;
        this.loop = loop;
        this.isPlaying = true;
        this.isIdle = false;
        this.pingPong = pingPong;
        this.frameDirection = 1;
        this.frameDelay = this.defaultFrameDelay;
      }

      playIdle() {
        const idleSeq = this.sequences["sequence-idle"];
        if (idleSeq && idleSeq.frames && idleSeq.frames.length > 1) {
          this.currentSequence = "sequence-idle";
          this.currentFrame = 0;
          this.frameTime = 0;
          this.loop = true;
          this.isPlaying = true;
          this.isIdle = true;
          this.pingPong = true;
          this.frameDirection = 1;
          this.frameDelay = this.idleFrameDelay;
          return;
        }

        // Default idle is a still pose: first frame only.
        const seq = this.sequences["sequence-01"];
        if (!seq || !seq.frames || seq.frames.length === 0) {
          return;
        }
        this.currentSequence = "sequence-01";
        this.currentFrame = 0;
        this.frameTime = 0;
        this.loop = false;
        this.isPlaying = false;
        this.isIdle = true;
        this.pingPong = false;
        this.frameDirection = 1;
        this.frameDelay = this.defaultFrameDelay;
      }

      update(deltaTime) {
        if (!this.isPlaying || !this.currentSequence) {
          return;
        }
        const seq = this.sequences[this.currentSequence];
        if (!seq) return;
        this.frameTime += deltaTime;
        if (this.frameTime >= this.frameDelay) {
          this.frameTime -= this.frameDelay;
          if (this.pingPong && seq.frames.length > 1) {
            this.currentFrame += this.frameDirection;

            if (this.currentFrame >= seq.frames.length) {
              this.frameDirection = -1;
              this.currentFrame = Math.max(0, seq.frames.length - 2);
            } else if (this.currentFrame < 0) {
              if (this.loop) {
                this.frameDirection = 1;
                this.currentFrame = Math.min(1, seq.frames.length - 1);
              } else {
                this.isPlaying = false;
                this.currentFrame = 0;
              }
            }
          } else {
            this.currentFrame += 1;

            if (this.currentFrame >= seq.frames.length) {
              if (this.loop) {
                this.currentFrame = 0;
              } else {
                this.isPlaying = false;
                this.currentFrame = seq.frames.length - 1;
              }
            }
          }
        }
      }

      getCurrentFrame() {
        if (!this.currentSequence) return null;
        const seq = this.sequences[this.currentSequence];
        if (!seq) return null;
        return seq.frames[Math.min(this.currentFrame, seq.frames.length - 1)];
      }

      stop() {
        this.isPlaying = false;
      }
    }

    // Load all sprite sequences
    async function loadSpriteSequences() {
      const characters = ['flash', 'green-lantern', 'hawkgirl', 'killercroc', 'doomsday'];
      
      for (const char of characters) {
        try {
          const response = await fetch(`images/sprites/${char}/frames/sequence-map.json?v=${Date.now()}`);
          if (!response.ok) continue;
          
          const data = await response.json();
          const sequences = {};
          
          data.sequences.forEach(seq => {
            sequences[seq.sequence] = {
              name: seq.sequence,
              frames: seq.frames.map(f => ({
                ...f,
                path: `images/sprites/${char}/frames/${seq.sequence}/${f.file}`
              }))
            };
          });

          if (char === "flash") {
            sanitizeFlashSequences(sequences);
          }

          if (char === "green-lantern") {
            sanitizeGreenLanternSequences(sequences);

            const framePaths = new Set();
            Object.values(sequences).forEach((seq) => {
              (seq.frames || []).forEach((frame) => {
                if (frame && frame.path) {
                  framePaths.add(frame.path);
                }
              });
            });
            framePaths.forEach((framePath) => requestGreenLanternFrameCleanup(framePath));
          }

          if (char === "killercroc") {
            sanitizeKillerCrocSequences(sequences);
            const framePaths = new Set();
            Object.values(sequences).forEach((seq) => {
              (seq.frames || []).forEach((frame) => {
                if (frame && frame.path) {
                  framePaths.add(frame.path);
                }
              });
            });
            framePaths.forEach((framePath) => requestKillerCrocFrameCleanup(framePath));
          }

          if (char === "doomsday") {
            sanitizeDoomsdaySequences(sequences);
          }

          if (char === "hawkgirl") {
            sanitizeHawkgirlSequences(sequences);
          }

          characterSpriteScale[char] = calculateCharacterSpriteScale(sequences);

          spriteSequences[char] = sequences;
          spriteAnimators[char] = new SpriteAnimator(char, sequences);
        } catch (error) {
          console.warn(`Failed to load sequences for ${char}:`, error);
        }
      }
      
      console.log('Sprite sequences loaded:', Object.keys(spriteSequences));
    }

    // Animation to sequence mapping
    const animationMap = {
      'idle': 'sequence-01',
      'run': 'sequence-01',
      'punch': 'sequence-02',
      'kick': 'sequence-03',
      'jump': 'sequence-01',
      'hit': 'sequence-01',
      'victory': 'sequence-01'
    };

    function getFacingScaleXForFighter(fighterEl) {
      const playerCenter = state.playerX + 36;
      const enemyCenter = state.enemyX + 36;

      if (fighterEl === playerEl) {
        return playerCenter <= enemyCenter ? 1 : -1;
      }
      return enemyCenter <= playerCenter ? 1 : -1;
    }

    // Render sprite frame to fighter element
    function renderSpriteFrame(fighterEl, characterId, animator) {
      const frame = animator.getCurrentFrame();
      if (!frame) {
        return;
      }

      let imgEl = fighterEl.querySelector('img.sprite-frame');
      if (!imgEl) {
        // Create sprite image element if it doesn't exist
        imgEl = document.createElement('img');
        imgEl.className = 'sprite-frame';
        imgEl.alt = characterId;
        fighterEl.appendChild(imgEl);
      }

      // Update image source.
      const nextSrc = resolveFrameSrc(characterId, frame.path);
      if (imgEl.src !== nextSrc) {
        imgEl.src = nextSrc;
      }

      const facingScaleX = getFacingScaleXForFighter(fighterEl);
      const normalizedScale = characterSpriteScale[characterId] || 1;
      const isFlashPlaceholderFrame = characterId === "flash" && frame.path === "images/flash-placeholder.png";
      const effectiveScale = isFlashPlaceholderFrame ? normalizedScale * 1.9 : normalizedScale;
      imgEl.style.transformOrigin = "center bottom";

      const isGreenLanternIdle = characterId === "green-lantern"
        && animator.isIdle
        && !fighterEl.classList.contains("jumping");

      const isHawkgirlIdle = characterId === "hawkgirl"
        && animator.isIdle
        && !fighterEl.classList.contains("jumping");

      const isDoomsdayIdle = characterId === "doomsday"
        && animator.isIdle
        && !fighterEl.classList.contains("jumping");

      const appliedScale = isDoomsdayIdle ? Math.min(effectiveScale, 0.86) : effectiveScale;
      const horizontalOffset = isDoomsdayIdle ? 14 : 0;

      if (isGreenLanternIdle) {
        const phaseOffset = fighterEl === enemyEl ? Math.PI : 0;
        const floatOffset = Math.sin(Date.now() * 0.005 + phaseOffset) * 4;
        imgEl.style.transform = `translateX(${horizontalOffset}px) translateY(${floatOffset.toFixed(2)}px) scale(${appliedScale.toFixed(3)}) scaleX(${facingScaleX})`;
      } else if (isHawkgirlIdle) {
        const phaseOffset = fighterEl === enemyEl ? Math.PI : 0;
        const floatOffset = Math.sin(Date.now() * 0.006 + phaseOffset) * 6;
        imgEl.style.transform = `translateX(${horizontalOffset}px) translateY(${floatOffset.toFixed(2)}px) scale(${appliedScale.toFixed(3)}) scaleX(${facingScaleX})`;
      } else {
        imgEl.style.transform = `translateX(${horizontalOffset}px) scale(${appliedScale.toFixed(3)}) scaleX(${facingScaleX})`;
      }
    }

    // Modify renderPositions to include sprite rendering
    const originalRenderPositions = renderPositions;
    renderPositions = function() {
      originalRenderPositions();
      
      if (state.roundActive && state.selectedCharacter && spriteAnimators[state.selectedCharacter.id]) {
        renderSpriteFrame(playerEl, state.selectedCharacter.id, spriteAnimators[state.selectedCharacter.id]);
      }
      
      if (state.roundActive && state.enemyCharacter && spriteAnimators[state.enemyCharacter.id]) {
        renderSpriteFrame(enemyEl, state.enemyCharacter.id, spriteAnimators[state.enemyCharacter.id]);
      }
    };

    // Animation loop
    let lastFrameTime = Date.now();
    setInterval(() => {
      const now = Date.now();
      const deltaTime = now - lastFrameTime;
      lastFrameTime = now;

      for (const animator of Object.values(spriteAnimators)) {
        animator.update(deltaTime);
      }
      
      renderPositions();
    }, 16); // ~60fps

    // Hook into game actions
    const originalPlayerAttack = playerAttack;
    playerAttack = function(type) {
      originalPlayerAttack.call(this, type);
      if (state.selectedCharacter && spriteAnimators[state.selectedCharacter.id]) {
        const animator = spriteAnimators[state.selectedCharacter.id];
        const sequenceName = getPlayerActionSequenceName(type);
        animator.playSequence(sequenceName, false);

        // Return to static idle after the action sequence.
        const seq = animator.sequences[sequenceName];
        const frameCount = seq && seq.frames ? seq.frames.length : 1;
        const animDuration = frameCount * animator.frameDelay + 100;
        setTimeout(() => animator.playIdle(), animDuration);
      }
    };

    const originalMovePlayer = movePlayer;
    movePlayer = function(direction) {
      originalMovePlayer.call(this, direction);
      // Keep run cycle active for any moving character while keys are held.
      if (state.selectedCharacter && direction !== 0 && spriteAnimators[state.selectedCharacter.id]) {
        updatePlayerRunState();
      }
    };

    const originalPerformPlayerJump = performPlayerJump;
    performPlayerJump = function() {
      originalPerformPlayerJump.call(this);
      if (state.selectedCharacter && spriteAnimators[state.selectedCharacter.id]) {
        const animator = spriteAnimators[state.selectedCharacter.id];
        animator.playSequence(animationMap.jump || "sequence-01", false);
        setTimeout(() => {
          animator.playIdle();
        }, 560);
      }
    };

    // Load sprites on page load
    loadSpriteSequences().then(() => {
      console.log('Sprites ready for combat!');
    });

    updateArenaMetrics();
    setMessage("Select your fighter to begin.");
  </script>
</body>
